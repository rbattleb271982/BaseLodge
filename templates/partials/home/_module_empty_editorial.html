<!--
Component: Module — Empty State Editorial
Purpose: Shown when the user has no trips and no other modules to display.
         Provides a brief brand statement and clear next-step actions.
Used on: Home screen (module type "empty_state")
Variants: none (static content, no dynamic inputs)

Inputs: none
-->

<div class="home-empty-editorial">
    <p style="margin: 0 0 20px 0; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 15px; line-height: 1.5; color: var(--bl-color-text-muted);">
        The best days on the mountain don't just happen. They're made.
    </p>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px;">
        <a href="{{ url_for('add_trip') }}"
           style="display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border: 1px solid #E5DFD0; border-radius: 10px; text-decoration: none; color: #1A1A1A;">
            <span style="font-size: 14px; font-weight: 500; color: #1A1A1A;">Plan a trip</span>
            <span style="font-size: 16px; color: #8A857A;">→</span>
        </a>
        <a href="{{ url_for('invite') }}"
           style="display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border: 1px solid #E5DFD0; border-radius: 10px; text-decoration: none; color: #1A1A1A;">
            <span style="font-size: 14px; font-weight: 500; color: #1A1A1A;">Invite a friend</span>
            <span style="font-size: 16px; color: #8A857A;">→</span>
        </a>
    </div>
</div>
