<!--
Component: Module — Empty State Editorial
Purpose: Shown when the user has no trips and no other modules to display.
         Provides a brief brand statement and a single clear CTA to plan their first trip.
Used on: Home screen (module type "empty_state")
Variants: none (static content, no dynamic inputs)

Inputs: none
-->

<div class="home-empty-editorial">
    <p style="margin: 0 0 16px 0; font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 15px; line-height: 1.5; color: var(--bl-color-text-muted);">
        The best days on the mountain don't just happen. They're made.
    </p>
    <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.5; color: var(--bl-color-text);">
        Plan your first trip to get started.
    </p>
    <a href="{{ url_for('add_trip') }}" class="home-activity-btn" style="display: inline-block; text-decoration: none;">Plan a Trip</a>
</div>
