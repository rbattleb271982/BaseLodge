<!--
Component: Happening Section
Purpose: Quiet ambient awareness of friend ski activity. Text-only, no avatars.
Used on: Home screen (only when happening_signals is non-empty)

Inputs:
  happening_signals  list of dicts
    [].text          string — pre-formatted signal, e.g. "Sam is planning Vail"
-->

<div class="bl-section" id="section-happening">
    <div class="bl-section-header">
        <span class="bl-section-title">Happening</span>
    </div>
    <div class="bl-happening-rows">
        {% for signal in happening_signals %}
        <div class="bl-happening-row">
            <p class="bl-happening-text">{{ signal.text }}</p>
        </div>
        {% endfor %}
    </div>
</div>
