<!--
Component: Happening Section
Purpose: Quiet ambient awareness of friend ski activity. One row per friend,
         editorial text format with subtle recency label beneath each row.
Used on: Home screen (only when happening_signals is non-empty)

Inputs:
  happening_signals  list of dicts
    [].text          string — editorial signal, e.g. "Mia Chen · Whistler"
    [].recency_label string — one of:
                       "Trip added today"    (created < 1 day)
                       "Trip updated today"  (updated_at < 1 day)
                       "Trip added this week"   (created 1–7 days)
                       "Trip updated this week" (updated_at 1–7 days)
                       "Upcoming trip"          (older or no timestamp)
    [].friend_id     int | None — user_id; when present the row links to their profile
-->

<div class="bl-section" id="section-happening">
    <div class="bl-section-header">
        <span class="bl-section-title">Happening</span>
    </div>
    <div class="bl-happening-rows">
        {% for signal in happening_signals %}
        {% if signal.friend_id %}
        <a href="/friends/{{ signal.friend_id }}" class="bl-happening-row bl-happening-row--link">
            <div class="bl-happening-body">
                <p class="bl-happening-text">{{ signal.text }}</p>
                {% if signal.recency_label %}
                <p class="bl-happening-recency">{{ signal.recency_label }}</p>
                {% endif %}
            </div>
            <span class="bl-happening-chevron">›</span>
        </a>
        {% else %}
        <div class="bl-happening-row">
            <div class="bl-happening-body">
                <p class="bl-happening-text">{{ signal.text }}</p>
                {% if signal.recency_label %}
                <p class="bl-happening-recency">{{ signal.recency_label }}</p>
                {% endif %}
            </div>
        </div>
        {% endif %}
        {% endfor %}
    </div>
</div>
