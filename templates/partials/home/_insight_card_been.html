<!--
Component: Ideas for You — Friend at Wishlist Mountain
Purpose: One idea row inside the IDEAS FOR YOU card. Notifies the user when a
         friend has visited one of their wishlist mountains.
Used on: Home screen — rendered inside the IDEAS FOR YOU hc-card wrapper in home.html
         (condition: friend_at_mountain_card is truthy)

Inputs:
  friend_at_mountain_card — dict
    .friend_id      int    friend's user ID
    .friend_name    string friend's full name
    .resort_name    string mountain name
    .card_key       string unique dismissal key e.g. "182:28:254"
-->

<div class="hc-idea-row" id="friend-at-mountain-card">
    <span class="hc-idea-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="17" height="17" style="display:block;color:#8A857A;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 19.5L8.25 8.25l3 4.5 3.75-6.75 6.75 13.5H2.25z" />
        </svg>
    </span>
    <p class="hc-idea-text">
        <a href="{{ url_for('friend_profile', friend_id=friend_at_mountain_card.friend_id) }}" style="text-decoration:none;color:inherit;"><strong>{{ friend_at_mountain_card.friend_name }}</strong></a> has been to your wishlist mountain, {{ friend_at_mountain_card.resort_name }}.
        <a href="{{ url_for('friend_profile', friend_id=friend_at_mountain_card.friend_id) }}" class="hc-idea-link">Ask about it.</a>
    </p>
    <button class="hc-idea-dismiss" aria-label="Dismiss"
        onclick="dismissInsightCard('friend_at_mountain','{{ friend_at_mountain_card.card_key }}','friend-at-mountain-card')">×</button>
</div>
