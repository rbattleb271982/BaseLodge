<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>html{background:#F5F1E8}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseLodge — Invite Not Found</title>
    <meta property="og:image" content="https://app.baselodgeapp.com/static/images/og/BaseLodge-logo-primary-1200x630.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:title" content="BaseLodge">
    <meta property="og:description" content="The best days on the mountain don't just happen. They're made.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="BaseLodge">
    <meta name="twitter:description" content="Plan ski trips with friends. See who's free, where they're going, and make it happen.">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png?v={{ ICONS_VERSION }}">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png?v={{ ICONS_VERSION }}">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png?v={{ ICONS_VERSION }}">
    <link rel="shortcut icon" href="/static/icons/favicon.ico?v={{ ICONS_VERSION }}">
    {% include 'components/analytics_head.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .edge-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bl-color-bg);
            padding: 24px 20px;
        }
        .edge-card {
            width: 100%;
            max-width: 400px;
        }
        .edge-logo {
            font-family: var(--bl-font-serif);
            font-size: 15px;
            font-weight: 400;
            color: var(--bl-color-text-muted);
            margin: 0 0 20px 0;
        }
        .edge-hero {
            background: var(--bl-color-surface-blush);
            border: 0.5px solid var(--bl-color-primary);
            border-radius: var(--bl-radius-md);
            padding: 20px;
            margin-bottom: 24px;
        }
        .edge-title {
            font-family: var(--bl-font-serif);
            font-size: 20px;
            font-weight: 400;
            color: var(--bl-color-text);
            margin: 0 0 8px 0;
        }
        .edge-desc {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            line-height: 1.55;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="edge-wrap">
        <div class="edge-card">
            <p class="edge-logo">BaseLodge</p>
            <div class="edge-hero">
                <h1 class="edge-title">{{ message | default("This invite link is no longer valid.") }}</h1>
                <p class="edge-desc">You can still join BaseLodge to connect with friends and plan trips.</p>
            </div>
            <a href="{{ url_for('auth') }}" class="bl-btn-primary" style="display: block; width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;">Sign up or log in</a>
        </div>
    </div>
</body>
</html>
