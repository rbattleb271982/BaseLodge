<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite not found - BaseLodge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .invite-invalid-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bl-color-bg);
            padding: var(--bl-space-6);
        }
        
        .invite-invalid-card {
            background: var(--bl-color-surface);
            border-radius: var(--bl-radius-lg);
            padding: var(--bl-space-8);
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--bl-shadow-soft);
        }
        
        .invite-invalid-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--bl-color-primary);
            margin-bottom: var(--bl-space-4);
        }
        
        .invite-invalid-subtitle {
            font-size: 18px;
            color: var(--bl-color-text);
            margin-bottom: var(--bl-space-4);
            font-weight: 600;
        }
        
        .invite-invalid-description {
            font-size: 15px;
            color: var(--bl-color-text-muted);
            line-height: 1.6;
            margin-bottom: var(--bl-space-8);
        }
        
        .invite-invalid-button {
            display: block;
            width: 100%;
            padding: var(--bl-space-5);
            background: var(--bl-color-primary);
            color: white;
            border: none;
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .invite-invalid-button:hover {
            background: #720115;
        }
    </style>
</head>
<body>
    <div class="invite-invalid-page">
        <div class="invite-invalid-card">
            <h1 class="invite-invalid-title">Base Lodge</h1>
            <p class="invite-invalid-subtitle">
                {{ message | default("This invite link is no longer valid.") }}
            </p>
            <p class="invite-invalid-description">
                You can still join BaseLodge to connect with friends and plan trips.
            </p>
            <a href="{{ url_for('auth') }}" class="invite-invalid-button">
                Go to sign up / log in
            </a>
        </div>
    </div>
</body>
</html>
