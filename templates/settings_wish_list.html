<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Wish List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .filter-row {
            display: flex;
            gap: var(--bl-space-3);
            margin-bottom: var(--bl-space-4);
        }
        
        .filter-row select {
            flex: 1;
            padding: 14px 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            min-height: 48px;
            box-sizing: border-box;
            background-color: var(--bl-color-bg);
            color: var(--bl-color-text);
        }
        
        .filter-row select:disabled {
            background-color: var(--bl-color-bg-secondary);
            color: var(--bl-color-text-muted);
            cursor: not-allowed;
            opacity: 1;
        }
        
        @media (prefers-color-scheme: dark) {
            .filter-row select {
                background-color: #1c1c1e;
                color: #ffffff;
                border-color: #2c2c2e;
            }
            
            .filter-row select:disabled {
                background-color: #141416;
                color: #6e6e73;
                border-color: #2c2c2e;
                opacity: 1;
            }
            
            .mountain-search {
                background-color: #1c1c1e;
                color: #ffffff;
                border-color: #2c2c2e;
            }
            
            .mountain-search::placeholder {
                color: #6e6e73;
            }
        }
        
        .mountain-search {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            margin-bottom: var(--bl-space-4);
            min-height: 48px;
            box-sizing: border-box;
        }
        
        .mountain-search:focus {
            outline: none;
            border-color: var(--bl-color-primary);
        }
        
        .mountain-search:disabled {
            background: var(--bl-color-bg-secondary);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .selected-counter {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-bottom: var(--bl-space-4);
        }
        
        .selected-mountains {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bl-space-3);
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bl-color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .mountain-pill .remove-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        
        .mountain-pill .remove-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .selected-mountains:empty {
            display: none;
        }
        
        .mountain-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bl-color-border);
            font-size: 15px;
            cursor: pointer;
        }
        
        .mountain-row input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .mountain-row.hidden {
            display: none;
        }
        
        .mountain-row.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .limit-message {
            text-align: center;
            padding: 10px;
            color: var(--bl-color-text-muted);
            font-size: 13px;
            background: rgba(143, 1, 27, 0.04);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .sticky-save-container {
            position: fixed;
            bottom: 72px;
            left: 0;
            right: 0;
            padding: 16px;
            background: var(--bl-color-bg);
            border-top: 1px solid var(--bl-color-border-soft);
            z-index: 100;
        }
        
        .sticky-save-container .bl-btn-primary {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: block;
        }
        
        .sticky-save-container .bl-btn-primary:disabled {
            background: var(--bl-color-text-muted);
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .resort-location {
            color: var(--bl-color-text-muted);
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="bl-header"><a href="{{ url_for('home') }}">Base Lodge</a></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <a href="{{ url_for('settings') }}" style="color: var(--bl-color-text-muted); text-decoration: none; font-size: 16px;">← Back</a>
            <button type="button" id="save-btn-top" class="bl-btn-primary" style="padding: 10px 20px; font-size: 15px;" disabled onclick="saveChanges()">Save</button>
        </div>
        <h1 class="page-title" id="bucket-list-mountains" style="margin-bottom: 8px;">Wish List Destinations</h1>
        <p style="font-size: 14px; color: var(--bl-color-text-muted); margin: 0 0 16px 0;">Mountains you want to ski someday.</p>
        
        <div class="selected-counter">
            <span id="count-display">{{ wish_list_ids|length }} of 3 selected</span>
        </div>
        
        <div class="selected-mountains" id="selected-pills">
            {% for resort in wish_list_resorts %}
            <span class="mountain-pill" data-id="{{ resort.id }}">
                {{ resort.name }}
                <button type="button" class="remove-btn" onclick="removeResort({{ resort.id }})" aria-label="Remove {{ resort.name }}">✕</button>
            </span>
            {% endfor %}
        </div>
        
        <div id="limit-message" class="limit-message" style="display: {% if wish_list_ids|length >= 3 %}block{% else %}none{% endif %};">
            Maximum 3 resorts reached
        </div>
        
        <div class="filter-row">
            <select id="country-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByCountry()">
                <option value="all">All countries</option>
                {% for country in countries %}
                <option value="{{ country.code }}">{{ country.name }}</option>
                {% endfor %}
            </select>
            
            <select id="region-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByRegion()" disabled>
                <option value="all">State / Province / Region</option>
            </select>
        </div>
        
        <input type="text" class="mountain-search" id="mountain-search" placeholder="Search resorts..." oninput="filterResorts()">
        
        <div class="mountain-list" id="mountain-list">
            {% for resort in resorts %}
            <label class="mountain-row {% if resort.id in wish_list_ids %}selected{% endif %}" 
                   data-id="{{ resort.id }}"
                   data-name="{{ resort.name|lower }}"
                   data-display-name="{{ resort.name }}"
                   data-country="{{ resort.country_code }}"
                   data-region="{{ resort.state_code }}">
                <input type="checkbox" name="resorts" value="{{ resort.id }}"
                       {% if resort.id in wish_list_ids %}checked{% endif %} 
                       onchange="updateSelection({{ resort.id }})">
                {{ resort.name }} <span class="resort-location">{{ resort.state_code }}</span>
            </label>
            {% endfor %}
        </div>
    </div>
    
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const originalIds = {{ wish_list_ids | tojson }};
        let selectedIds = [...originalIds];
        const maxResorts = 3;
        let currentCountryFilter = 'all';
        let currentRegionFilter = 'all';
        
        function hasChanges() {
            if (originalIds.length !== selectedIds.length) return true;
            const sortedOriginal = [...originalIds].sort();
            const sortedSelected = [...selectedIds].sort();
            return !sortedOriginal.every((val, idx) => val === sortedSelected[idx]);
        }
        
        function updateSaveButton() {
            const saveBtn = document.getElementById('save-btn-top');
            saveBtn.disabled = !hasChanges();
        }
        
        async function filterByCountry() {
            currentCountryFilter = document.getElementById('country-filter').value;
            const regionSelect = document.getElementById('region-filter');
            
            // Reset region filter
            currentRegionFilter = 'all';
            regionSelect.innerHTML = '<option value="all">State / Province / Region</option>';
            
            if (currentCountryFilter === 'all') {
                regionSelect.disabled = true;
            } else {
                // Fetch regions for this country
                try {
                    const response = await fetch(`/api/resort-regions/${currentCountryFilter}`);
                    const regions = await response.json();
                    
                    regions.forEach(region => {
                        const option = document.createElement('option');
                        option.value = region;
                        option.textContent = region;
                        regionSelect.appendChild(option);
                    });
                    
                    regionSelect.disabled = false;
                } catch (error) {
                    console.error('Failed to load regions:', error);
                    regionSelect.disabled = true;
                }
            }
            
            filterResorts();
        }
        
        function filterByRegion() {
            currentRegionFilter = document.getElementById('region-filter').value;
            filterResorts();
        }
        
        function filterResorts() {
            const searchTerm = document.getElementById('mountain-search').value.toLowerCase();
            const rows = document.querySelectorAll('.mountain-row');
            
            rows.forEach(row => {
                const name = row.dataset.name;
                const country = row.dataset.country;
                const region = row.dataset.region;
                
                const matchesSearch = name.includes(searchTerm);
                const matchesCountry = currentCountryFilter === 'all' || country === currentCountryFilter;
                const matchesRegion = currentRegionFilter === 'all' || region === currentRegionFilter;
                
                if (matchesSearch && matchesCountry && matchesRegion) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }
        
        function updateSelection(id) {
            const index = selectedIds.indexOf(id);
            
            if (index > -1) {
                selectedIds.splice(index, 1);
            } else {
                if (selectedIds.length >= maxResorts) {
                    const checkbox = document.querySelector(`input[value="${id}"]`);
                    if (checkbox) checkbox.checked = false;
                    return;
                }
                selectedIds.push(id);
            }
            
            updateUI();
            updateSaveButton();
        }
        
        function removeResort(id) {
            const index = selectedIds.indexOf(id);
            if (index > -1) {
                selectedIds.splice(index, 1);
                const checkbox = document.querySelector(`input[value="${id}"]`);
                if (checkbox) checkbox.checked = false;
                updateUI();
                updateSaveButton();
            }
        }
        
        function updateUI() {
            const countDisplay = document.getElementById('count-display');
            countDisplay.textContent = selectedIds.length + ' of 3 selected';
            
            const limitMsg = document.getElementById('limit-message');
            limitMsg.style.display = selectedIds.length >= maxResorts ? 'block' : 'none';
            
            const pillsContainer = document.getElementById('selected-pills');
            pillsContainer.innerHTML = '';
            
            selectedIds.forEach(id => {
                const row = document.querySelector(`.mountain-row[data-id="${id}"]`);
                if (row) {
                    const displayName = row.getAttribute('data-display-name');
                    
                    const pill = document.createElement('span');
                    pill.className = 'mountain-pill';
                    pill.setAttribute('data-id', id);
                    pill.innerHTML = displayName + ' <button type="button" class="remove-btn" onclick="removeResort(' + id + ')" aria-label="Remove">✕</button>';
                    pillsContainer.appendChild(pill);
                }
            });
            
            document.querySelectorAll('.mountain-row input').forEach(checkbox => {
                const id = parseInt(checkbox.value);
                checkbox.checked = selectedIds.includes(id);
            });
        }
        
        async function saveChanges() {
            const saveBtn = document.getElementById('save-btn-top');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            
            try {
                const response = await fetch('{{ url_for("settings_wish_list_save") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ resort_ids: selectedIds })
                });
                
                const data = await response.json();
                if (data.success) {
                    window.location.href = '{{ url_for("settings") }}';
                } else {
                    alert('Failed to save changes');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save';
                }
            } catch (error) {
                alert('Failed to save changes');
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save';
            }
        }
        
        // Handle anchor scroll with offset for fixed header
        if (window.location.hash) {
            document.addEventListener('DOMContentLoaded', function() {
                const target = document.querySelector(window.location.hash);
                if (target) {
                    setTimeout(function() {
                        const offset = 80;
                        const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top: top, behavior: 'smooth' });
                    }, 100);
                }
            });
        }
    </script>
</body>
</html>
