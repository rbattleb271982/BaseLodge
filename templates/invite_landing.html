<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're invited to BaseLodge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .invite-landing-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bl-color-bg);
            padding: var(--bl-space-6);
        }
        
        .invite-landing-card {
            background: var(--bl-color-surface);
            border-radius: var(--bl-radius-lg);
            padding: var(--bl-space-8);
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--bl-shadow-soft);
        }
        
        .invite-landing-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--bl-color-primary);
            margin-bottom: var(--bl-space-4);
        }
        
        .invite-landing-subtitle {
            font-size: 18px;
            color: var(--bl-color-text);
            margin-bottom: var(--bl-space-4);
            font-weight: 600;
        }
        
        .invite-landing-description {
            font-size: 15px;
            color: var(--bl-color-text-muted);
            line-height: 1.6;
            margin-bottom: var(--bl-space-8);
        }
        
        .invite-landing-button {
            display: block;
            width: 100%;
            padding: var(--bl-space-5);
            background: var(--bl-color-primary);
            color: white;
            border: none;
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .invite-landing-button:hover {
            background: #720115;
        }
        
        .invite-landing-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--bl-space-4);
            margin-bottom: var(--bl-space-6);
        }
        
        .invite-landing-button-secondary {
            display: block;
            width: 100%;
            padding: var(--bl-space-5);
            background: transparent;
            color: var(--bl-color-primary);
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .invite-landing-button-secondary:hover {
            background: var(--bl-color-bg);
            border-color: var(--bl-color-primary);
        }
        
        .invite-landing-fine-print {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-top: var(--bl-space-6);
        }
    </style>
</head>
<body>
    <div class="invite-landing-page">
        <div class="invite-landing-card">
            <h1 class="invite-landing-title">{{ inviter.first_name }} wants to connect on BaseLodge</h1>
            <p class="invite-landing-subtitle">
                See when you can hit the slopes together and share ski trips.
            </p>

            <div class="invite-landing-buttons">
                <a href="{{ url_for('auth') }}" class="invite-landing-button">
                    Create account to connect
                </a>
                <a href="{{ url_for('auth') }}" class="invite-landing-button-secondary">
                    Already have an account? Log in
                </a>
            </div>

            <p class="invite-landing-fine-print">
                By continuing, you'll create a BaseLodge account or log in to an existing one.
            </p>
        </div>
    </div>
</body>
</html>
