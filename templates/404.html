<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — BaseLodge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .edge-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bl-color-bg);
            padding: 24px 20px;
        }
        .edge-card {
            width: 100%;
            max-width: 400px;
        }
        .edge-logo {
            font-family: var(--bl-font-serif);
            font-size: 15px;
            font-weight: 400;
            color: var(--bl-color-text-muted);
            margin: 0 0 20px 0;
        }
        .edge-hero {
            background: var(--bl-color-surface-blush);
            border: 0.5px solid var(--bl-color-primary);
            border-radius: var(--bl-radius-md);
            padding: 20px;
            margin-bottom: 24px;
        }
        .edge-title {
            font-family: var(--bl-font-serif);
            font-size: 20px;
            font-weight: 400;
            color: var(--bl-color-text);
            margin: 0 0 8px 0;
        }
        .edge-desc {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            line-height: 1.55;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="edge-wrap">
        <div class="edge-card">
            <p class="edge-logo">BaseLodge</p>
            <div class="edge-hero">
                <h1 class="edge-title">Page not found</h1>
                <p class="edge-desc">We couldn't find the page you're looking for. It may have been moved or no longer exists.</p>
            </div>
            <a href="{{ url_for('home') }}" class="bl-btn-primary" style="display: block; width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;">Back to Home</a>
        </div>
    </div>
</body>
</html>
