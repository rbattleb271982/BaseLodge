<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseLodge Download QR Code</title>
  <link rel="icon" href="/static/icons/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #F5F1E8;
      color: #1C1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrap {
      text-align: center;
      padding: 48px 24px 64px;
      max-width: 380px;
      width: 100%;
    }

    .qr-wordmark {
      height: 28px;
      width: auto;
      margin: 0 auto 32px;
      display: block;
    }

    .qr-frame {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      display: inline-block;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .qr-frame img {
      display: block;
      width: 240px;
      height: 240px;
    }

    .qr-url {
      font-size: 13px;
      color: #6B6157;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .qr-url strong {
      color: #1C1917;
      font-weight: 600;
    }

    .qr-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #5C1219;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
      margin-bottom: 32px;
    }
    .qr-download:hover { opacity: 0.87; }

    .qr-back {
      display: block;
      font-size: 13px;
      color: #9A9186;
      text-decoration: none;
    }
    .qr-back:hover { color: #5C1219; }
  </style>
</head>
<body>
  <div class="qr-wrap">

    <img src="/static/images/baselodge-wordmark.png"
         alt="BaseLodge"
         class="qr-wordmark">

    <div class="qr-frame">
      <img src="/static/qr/baselodge-download-qr.png"
           alt="QR code — scan to download BaseLodge">
    </div>

    <p class="qr-url">
      Scans to<br>
      <strong>https://app.baselodgeapp.com/download</strong>
    </p>

    <a href="/static/qr/baselodge-download-qr.png"
       download="baselodge-download-qr.png"
       class="qr-download">
      Download PNG
    </a>

    <a href="/download" class="qr-back">&larr; Back to download page</a>

  </div>
</body>
</html>
