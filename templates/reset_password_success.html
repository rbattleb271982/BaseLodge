{% extends "auth_base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <h2 class="auth-title" style="color: #2e7d32;">Success!</h2>
        <p style="margin-bottom: 20px; color: var(--bl-color-text-muted);">
            Your password has been successfully reset.
        </p>
        
        <div style="margin-top: 20px;">
            <a href="{{ url_for('auth') }}" class="bl-btn-primary" style="display: block; padding: 12px; border: none; border-radius: var(--bl-radius-md); background: var(--bl-color-primary); color: white; font-weight: 600; cursor: pointer; text-decoration: none;">
                Log In Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
