<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Something Went Wrong</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .error-card {
            max-width: 400px;
            background: var(--bl-color-surface);
            border-radius: var(--bl-radius-lg);
            padding: 32px 24px;
            box-shadow: var(--bl-shadow-soft);
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--bl-color-text);
            margin: 0 0 12px 0;
        }
        .error-message {
            font-size: 15px;
            color: var(--bl-color-text-muted);
            line-height: 1.5;
            margin: 0 0 24px 0;
        }
        .error-cta {
            display: inline-block;
            padding: 14px 28px;
            background: var(--bl-color-primary);
            color: white;
            text-decoration: none;
            border-radius: var(--bl-radius-lg);
            font-weight: 600;
            font-size: 16px;
        }
        .error-cta:active {
            background: #6B000F;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">⛷️</div>
            <h1 class="error-title">Something went wrong</h1>
            <p class="error-message">
                We hit an unexpected bump on the slope. Don't worry — your data is safe. Please try again in a moment.
            </p>
            <a href="{{ url_for('home') }}" class="error-cta">Back to Home</a>
        </div>
    </div>
</body>
</html>
