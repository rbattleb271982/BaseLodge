<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <style>html { background: #F5F1E8; }</style>
    <title>BaseLodge — Connected</title>

    <!-- iOS Safari Smart App Banner -->
    <meta name="apple-itunes-app" content="app-id=6764206581">

    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png?v={{ ICONS_VERSION }}">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png?v={{ ICONS_VERSION }}">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png?v={{ ICONS_VERSION }}">
    <link rel="shortcut icon" href="/static/icons/favicon.ico?v={{ ICONS_VERSION }}">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: auto;
            overflow-y: auto;
        }

        body {
            background: #F5F1E8;
            color: #1A1A1A;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100dvh;
            padding: calc(env(safe-area-inset-top, 0px) + 48px) 24px
                     calc(env(safe-area-inset-bottom, 0px) + 48px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ia-wrap {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ia-wordmark {
            display: block;
            width: 180px;
            max-width: 70%;
            height: auto;
            margin: 0 auto 40px;
        }

        .ia-check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #5C1219;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .ia-headline {
            font-family: Georgia, "Times New Roman", Times, serif;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.3;
            color: #1A1A1A;
            text-align: center;
            margin-bottom: 14px;
        }

        .ia-body {
            font-size: 15px;
            line-height: 1.55;
            color: #555;
            text-align: center;
            margin-bottom: 36px;
        }

        .ia-divider {
            width: 40px;
            height: 1px;
            background: #D5CEBE;
            margin: 0 auto 32px;
        }

        .ia-btn-primary {
            display: block;
            width: 100%;
            padding: 14px 20px;
            background: #5C1219;
            color: #F5F1E8;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            text-align: center;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 16px;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.15s ease;
        }
        .ia-btn-primary:active { opacity: 0.82; }

        .ia-btn-secondary {
            display: block;
            width: 100%;
            padding: 12px 20px;
            background: transparent;
            color: #5C1219;
            font-size: 14px;
            font-weight: 400;
            font-family: inherit;
            text-align: center;
            border: 1px solid #C9BFB0;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.15s ease, opacity 0.15s ease;
            margin-bottom: 20px;
        }
        .ia-btn-secondary:active { opacity: 0.72; }

        .ia-fallback-note {
            font-size: 12px;
            color: #999;
            text-align: center;
            line-height: 1.55;
            padding: 0 8px;
        }
    </style>
</head>
<body>
<div class="ia-wrap">

    <img class="ia-wordmark"
         src="/static/images/baselodge-wordmark.png"
         alt="BaseLodge">

    <div class="ia-check" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 14.5L11.5 20L22 9" stroke="#F5F1E8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <h1 class="ia-headline">You're connected with {{ inviter.first_name if inviter and inviter.first_name else 'your friend' }}</h1>

    <p class="ia-body">You can now plan mountain trips together on BaseLodge.</p>

    <div class="ia-divider"></div>

    <button id="ia-open-app" class="ia-btn-primary" type="button">Open BaseLodge</button>

    <a href="/friends" class="ia-btn-secondary">Continue in browser</a>

    <p class="ia-fallback-note">Already have the app? Open BaseLodge to view your Friends screen.</p>

</div>

<script>
(function() {
    document.getElementById('ia-open-app').addEventListener('click', function() {
        var ua = navigator.userAgent || '';
        var isIOS     = /iPhone|iPad|iPod/i.test(ua);
        var isAndroid = /Android/i.test(ua);

        // Inside the Capacitor native app — navigate the webview directly.
        // No deep link scheme needed; we are already inside the app.
        var inNative = window.Capacitor
            && typeof window.Capacitor.isNativePlatform === 'function'
            && window.Capacitor.isNativePlatform();

        if (inNative) {
            window.location.href = '/friends';
            return;
        }

        // Android browser — Intent URL opens the app if installed, Play Store otherwise.
        if (isAndroid) {
            window.location.href = 'intent://app.baselodgeapp.com/friends'
                + '#Intent;scheme=https;package=com.baselodge.app;'
                + 'S.browser_fallback_url='
                + encodeURIComponent('https://play.google.com/store/apps/details?id=com.baselodge.app')
                + ';end';
            return;
        }

        // iOS browser — Universal Link; iOS intercepts and opens the app if installed
        // and the new build with Associated Domains is active. Falls back to App Store
        // after 2 s if the page is still visible (app not installed or UL not yet active).
        if (isIOS) {
            var iosTimer = setTimeout(function() {
                window.location.href = 'https://apps.apple.com/app/id6764206581';
            }, 2000);
            function cancelIos() {
                clearTimeout(iosTimer);
                document.removeEventListener('visibilitychange', onVis);
                window.removeEventListener('blur', onBlur);
            }
            function onVis()  { if (document.hidden) { cancelIos(); } }
            function onBlur() { cancelIos(); }
            document.addEventListener('visibilitychange', onVis);
            window.addEventListener('blur', onBlur);
            window.location.href = 'https://app.baselodgeapp.com/friends';
            return;
        }

        // Desktop browser — go to the download page.
        window.location.href = '/download';
    });
})();
</script>
</body>
</html>
