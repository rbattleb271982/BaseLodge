{% extends "auth_base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <h2 class="auth-title" style="color: #c62828;">Invalid or Expired Link</h2>
        <p style="margin-bottom: 20px; color: var(--bl-color-text-muted);">
            The password reset link you clicked is invalid or has expired. Please request a new one.
        </p>
        
        <div style="margin-top: 20px;">
            <a href="{{ url_for('forgot_password') }}" class="bl-btn-primary" style="display: block; padding: 12px; border: none; border-radius: var(--bl-radius-md); background: var(--bl-color-primary); color: white; font-weight: 600; cursor: pointer; text-decoration: none;">
                Request New Link
            </a>
        </div>
        
        <div style="margin-top: 20px;">
            <a href="{{ url_for('auth') }}" style="color: var(--bl-color-primary); text-decoration: none; font-size: 14px;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
