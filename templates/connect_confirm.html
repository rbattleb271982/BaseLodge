<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect — BaseLodge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    {% include 'components/analytics_head.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .connect-wrap {
            padding: 32px 20px 88px;
            max-width: 480px;
            margin: 0 auto;
        }
        .connect-hero {
            background: var(--bl-color-surface-blush);
            border: 0.5px solid var(--bl-color-primary);
            border-radius: var(--bl-radius-md);
            padding: 20px;
            margin-bottom: 28px;
        }
        .connect-hero-title {
            font-family: var(--bl-font-serif);
            font-size: 20px;
            font-weight: 400;
            color: var(--bl-color-text);
            margin: 0 0 6px 0;
        }
        .connect-hero-sub {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            margin: 0;
            line-height: 1.5;
        }
        .connect-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="connect-wrap">
            <div class="connect-hero">
                <h1 class="connect-hero-title">Connect with {{ friend.first_name | format_name }} {{ friend.last_name | format_name }}?</h1>
                <p class="connect-hero-sub">You'll be able to see each other's trips and plan together.</p>
            </div>

            <div class="connect-actions">
                <form method="POST" action="{{ url_for('connect_add', user_id=friend.id) }}">
                    <button type="submit" class="bl-btn-primary" style="width: 100%;">Add as Friend</button>
                </form>
                <a href="{{ url_for('home') }}" style="display: block; text-align: center; font-size: 14px; color: var(--bl-color-text-muted); text-decoration: none; padding: 10px 0;">Cancel</a>
            </div>
        </div>
    </div>
    {% include 'components/bottom_nav.html' %}
</body>
</html>
