{% extends "base.html" %}
{% block content %}
<div class="page-container" style="text-align: center; padding-top: 60px;">
    <div style="font-size: 64px; margin-bottom: 24px;">⌛</div>
    <h1 class="page-title" style="margin-bottom: 16px;">This invite has expired</h1>
    <p style="color: var(--bl-color-text-muted); font-size: 1.1rem; margin-bottom: 32px; line-height: 1.6;">
        Ask your friend to send you a new one — it only takes a second.
    </p>
    <a href="{{ url_for('auth') }}" class="bl-btn-primary" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 32px;">
        Go to Login
    </a>
</div>
{% endblock %}
