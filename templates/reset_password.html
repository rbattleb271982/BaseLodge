<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — BaseLodge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .form-group {
            margin-bottom: var(--bl-space-5);
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: var(--bl-space-3);
            color: var(--bl-color-text);
        }
        .form-group input {
            width: 100%;
            padding: var(--bl-space-4) var(--bl-space-5);
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 15px;
            font-family: inherit;
            background: var(--bl-color-surface);
            color: var(--bl-color-text);
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: var(--bl-color-text-muted);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--bl-color-primary);
        }
        .flash-banner {
            border-radius: var(--bl-radius-md);
            padding: var(--bl-space-4);
            margin-bottom: var(--bl-space-5);
            font-size: 13px;
        }
        .flash-error {
            background: rgba(92, 18, 25, 0.06);
            border: 1px solid rgba(92, 18, 25, 0.2);
            color: var(--bl-color-primary);
        }
        .flash-info {
            background: rgba(92, 18, 25, 0.04);
            border: 1px solid var(--bl-color-border-soft);
            color: var(--bl-color-text-muted);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Reset password</h1>
                <p class="auth-subtitle">Please enter your new password below.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-banner flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required placeholder="Minimum 8 characters" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-type password" autocomplete="new-password">
                </div>

                <button type="submit" class="bl-btn-primary" style="width: 100%; margin-top: var(--bl-space-3);">Reset Password</button>
            </form>
        </div>
    </div>
</body>
</html>
