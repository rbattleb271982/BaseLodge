<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BaseLodge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--bl-space-8);
    }
    .auth-card {
      background: var(--bl-color-surface);
      border-radius: var(--bl-radius-lg);
      padding: var(--bl-space-8);
      max-width: 400px;
      width: 100%;
      box-shadow: var(--bl-shadow-card);
    }
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--bl-space-6);
      text-align: center;
    }
    .flash-message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: var(--bl-radius-sm);
      font-size: 14px;
    }
    .flash-error {
      background: #ffebee;
      color: #c62828;
    }
    .flash-info {
      background: #e3f2fd;
      color: #0d47a1;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: var(--bl-space-3);
      color: var(--bl-color-text);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Reset Password</h2>
      <p style="margin-bottom: 20px; color: var(--bl-color-text-muted);">
        Please enter your new password below.
      </p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required placeholder="Minimum 8 characters" style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md);">
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-type password" style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md);">
        </div>

        <button type="submit" class="bl-btn-primary" style="width: 100%; padding: 12px; border: none; border-radius: var(--bl-radius-md); background: var(--bl-color-primary); color: white; font-weight: 600; cursor: pointer;">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</body>
</html>
