{% extends "auth_base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Reset Password</h2>
        <p style="margin-bottom: 20px; color: var(--bl-color-text-muted);">
            Please enter your new password below.
        </p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-{{ category }}" style="margin-bottom: 15px; padding: 10px; border-radius: 4px; background: {% if category == 'error' %}#ffebee{% else %}#e3f2fd{% endif %}; color: {% if category == 'error' %}#c62828{% else %}#0d47a1{% endif %};">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="Minimum 8 characters" style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md);">
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-type password" style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md);">
            </div>
            
            <button type="submit" class="bl-btn-primary" style="width: 100%; padding: 12px; border: none; border-radius: var(--bl-radius-md); background: var(--bl-color-primary); color: white; font-weight: 600; cursor: pointer;">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
