<div class="stat-row">
    <div class="stat-row-tile {% if stat_trips_url %}stat-row-tile--link{% endif %}"
         {% if stat_trips_url %}onclick="window.location.href='{{ stat_trips_url }}'"{% endif %}
         style="cursor:{% if stat_trips_url %}pointer{% else %}default{% endif %};">
        <span class="stat-row-value">{{ stat_trips_total or 0 }}</span>
        <span class="stat-row-label">{{ "Trip" if (stat_trips_total or 0) == 1 else "Trips" }}</span>
    </div>
    <div class="stat-row-divider"></div>
    <div class="stat-row-tile {% if stat_mountains_url %}stat-row-tile--link{% endif %}"
         {% if stat_mountains_url %}onclick="window.location.href='{{ stat_mountains_url }}'"{% endif %}
         style="cursor:{% if stat_mountains_url %}pointer{% else %}default{% endif %};">
        <span class="stat-row-value">{{ stat_mountains or 0 }}</span>
        <span class="stat-row-label">{{ "Mountain Visited" if (stat_mountains or 0) == 1 else "Mountains Visited" }}</span>
    </div>
    <div class="stat-row-divider"></div>
    <div class="stat-row-tile {% if stat_wishlist_url %}stat-row-tile--link{% endif %}"
         {% if stat_wishlist_url %}onclick="window.location.href='{{ stat_wishlist_url }}'"{% endif %}
         style="cursor:{% if stat_wishlist_url %}pointer{% else %}default{% endif %};">
        <span class="stat-row-value">{{ stat_wishlist or 0 }}</span>
        <span class="stat-row-label">{{ "Wishlist Mountain" if (stat_wishlist or 0) == 1 else "Wishlist Mountains" }}</span>
    </div>
</div>
