{# Phase 1: included in all standalone templates for consistent identity tracking #}
<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
  (function() {
    var _csrfToken = document.querySelector('meta[name="csrf-token"]') && document.querySelector('meta[name="csrf-token"]').content;
    var _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      opts = opts || {};
      if (!opts.method || opts.method.toUpperCase() === 'GET') return _origFetch(url, opts);
      opts.headers = opts.headers || {};
      if (opts.headers instanceof Headers) {
        if (!opts.headers.has('X-CSRF-Token')) opts.headers.set('X-CSRF-Token', _csrfToken);
      } else {
        opts.headers['X-CSRF-Token'] = opts.headers['X-CSRF-Token'] || _csrfToken;
      }
      return _origFetch(url, opts);
    };
  })();
</script>
<script>
  window.__USER__ = {
    id: {% if current_user.is_authenticated %}{{ current_user.id | tojson }}{% else %}null{% endif %},
    is_internal: {% if current_user.is_authenticated %}{{ is_internal_user(current_user.email) | tojson }}{% else %}false{% endif %}
  };
  window.__POSTHOG_RESET__ = {{ posthog_reset | default(false) | tojson }};
  window.__POSTHOG_KEY__ = {{ POSTHOG_KEY | tojson }};
  window.__POSTHOG_HOST__ = {{ POSTHOG_HOST | tojson }};
</script>
<script src="{{ url_for('static', filename='analytics.js') }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('submit', function(e) {
      var form = e.target;
      if (form.tagName !== 'FORM') return;
      var btn = form.querySelector('button[type="submit"], input[type="submit"]');
      if (!btn || btn.dataset.noLoader === 'true') return;
      btn.disabled = true;
      if (!btn.dataset.loadingText) return;
      btn._origText = btn.textContent;
      btn.textContent = btn.dataset.loadingText;
    });
  });
</script>
<script>
  /* Keyboard-safe scroll: when an input is focused on mobile, scroll it into
     view after a short delay so the iOS keyboard doesn't cover it. */
  document.addEventListener('focusin', function(e) {
    var el = e.target;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
      setTimeout(function() {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 320);
    }
  });
</script>
<script>
  /* Push notification token capture — native Capacitor app only.
     Runs only when window.Capacitor.isNativePlatform() is true (iOS shell).
     All push code is fully skipped in regular web browsers and Safari.
     DEBUG LOGS ACTIVE — remove after confirming end-to-end flow. */
  (function() {
    console.log('[Push] Script loaded');
    console.log('[Push] window.Capacitor exists:', typeof window.Capacitor !== 'undefined');
    console.log('[Push] window.Capacitor.isNativePlatform exists:', !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function'));
    var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
    console.log('[Push] isNativePlatform():', isNative);

    if (!isNative) {
      console.log('[Push] Not native — push setup skipped');
      return;
    }

    if (!window.__USER__ || !window.__USER__.id) {
      console.log('[Push] No authenticated user — push setup skipped');
      return;
    }
    console.log('[Push] Authenticated user id:', window.__USER__.id);

    console.log('[Push] Capacitor.Plugins keys:', window.Capacitor.Plugins ? Object.keys(window.Capacitor.Plugins).join(', ') : 'Plugins object missing');
    var Push = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
    console.log('[Push] PushNotifications plugin available:', !!Push);
    if (!Push) {
      console.warn('[Push] PushNotifications plugin not found in Capacitor.Plugins — aborting');
      return;
    }

    Push.addListener('registration', function(token) {
      console.log('[Push] registration event fired — token received (length:', (token && token.value ? token.value.length : 'n/a'), ')');
      window.fetch('/api/push/register-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token.value, platform: 'ios' })
      }).then(function(res) {
        console.log('[Push] POST /api/push/register-token →', res.status, res.ok ? 'OK' : 'FAILED');
      }).catch(function(err) {
        console.warn('[Push] POST /api/push/register-token fetch error:', err);
      });
    });

    Push.addListener('registrationError', function(err) {
      console.warn('[Push] registrationError event:', err.error);
    });

    console.log('[Push] Calling requestPermissions()...');
    Push.requestPermissions().then(function(result) {
      console.log('[Push] requestPermissions result:', JSON.stringify(result));
      if (result.receive === 'granted') {
        console.log('[Push] Permission granted — calling register()');
        Push.register().then(function() {
          console.log('[Push] register() call succeeded — waiting for registration event');
        }).catch(function(err) {
          console.warn('[Push] register() call failed:', err);
        });
      } else {
        console.log('[Push] Permission not granted — receive status:', result.receive);
      }
    }).catch(function(err) {
      console.warn('[Push] requestPermissions() error:', err);
    });
  })();
</script>
