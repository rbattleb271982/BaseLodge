{# Phase 1: included in all standalone templates for consistent identity tracking #}
<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
  (function() {
    var _csrfToken = document.querySelector('meta[name="csrf-token"]') && document.querySelector('meta[name="csrf-token"]').content;
    var _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      opts = opts || {};
      if (!opts.method || opts.method.toUpperCase() === 'GET') return _origFetch(url, opts);
      opts.headers = opts.headers || {};
      if (opts.headers instanceof Headers) {
        if (!opts.headers.has('X-CSRF-Token')) opts.headers.set('X-CSRF-Token', _csrfToken);
      } else {
        opts.headers['X-CSRF-Token'] = opts.headers['X-CSRF-Token'] || _csrfToken;
      }
      return _origFetch(url, opts);
    };
  })();
</script>
<script>
  window.__USER__ = {
    id: {% if current_user.is_authenticated %}{{ current_user.id | tojson }}{% else %}null{% endif %},
    is_internal: {% if current_user.is_authenticated %}{{ is_internal_user(current_user.email) | tojson }}{% else %}false{% endif %}
  };
  window.__POSTHOG_RESET__ = {{ posthog_reset | default(false) | tojson }};
  window.__POSTHOG_KEY__ = {{ POSTHOG_KEY | tojson }};
  window.__POSTHOG_HOST__ = {{ POSTHOG_HOST | tojson }};
</script>
<script src="{{ url_for('static', filename='analytics.js') }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('submit', function(e) {
      var form = e.target;
      if (form.tagName !== 'FORM') return;
      var btn = form.querySelector('button[type="submit"], input[type="submit"]');
      if (!btn || btn.dataset.noLoader === 'true') return;
      btn.disabled = true;
      if (!btn.dataset.loadingText) return;
      btn._origText = btn.textContent;
      btn.textContent = btn.dataset.loadingText;
    });
  });
</script>
<script>
  /* Keyboard-safe scroll: when an input is focused on mobile, scroll it into
     view after a short delay so the iOS keyboard doesn't cover it. */
  document.addEventListener('focusin', function(e) {
    var el = e.target;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
      setTimeout(function() {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 320);
    }
  });
</script>
<script>
  /* Push notification token capture — native Capacitor iOS shell only.
     Deferred to DOMContentLoaded so Capacitor plugin bridge is fully wired.
     Runs once per session per user via sessionStorage dedup key.
     sessionStorage is cleared on app restart and after a fresh reinstall,
     so each new install / app relaunch will re-register the token.
     DEBUG LOGS ACTIVE. */
  document.addEventListener('DOMContentLoaded', function() {
    (async function() {
      // ── Gate 1: native Capacitor shell only ─────────────────────────────
      var isNative = !!(
        window.Capacitor &&
        typeof window.Capacitor.isNativePlatform === 'function' &&
        window.Capacitor.isNativePlatform()
      );
      console.log('[Push] DOMContentLoaded — isNativePlatform():', isNative);
      if (!isNative) {
        console.log('[Push] Not native — push setup skipped');
        return;
      }

      // ── Gate 2: authenticated user ───────────────────────────────────────
      var userId = window.__USER__ && window.__USER__.id;
      console.log('[Push] Authenticated user id:', userId || '(none)');
      if (!userId) {
        console.log('[Push] No authenticated user — push setup skipped');
        return;
      }

      // ── Gate 3: once per session per user (sessionStorage dedup) ─────────
      // sessionStorage is scoped to the WKWebView session and cleared on
      // app restart / reinstall, so this naturally re-runs after reinstall.
      var storageKey = 'pushRegAttempted_u' + userId;
      if (sessionStorage.getItem(storageKey)) {
        console.log('[Push] Already attempted this session for user', userId, '— skipping');
        return;
      }
      sessionStorage.setItem(storageKey, '1');
      console.log('[Push] Starting push registration for user', userId);

      // ── Plugin check ─────────────────────────────────────────────────────
      var pluginKeys = window.Capacitor.Plugins ? Object.keys(window.Capacitor.Plugins).join(', ') : '(Plugins missing)';
      console.log('[Push] Capacitor.Plugins keys:', pluginKeys);
      var Push = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
      console.log('[Push] PushNotifications plugin available:', !!Push);
      if (!Push) {
        console.warn('[Push] PushNotifications plugin not found — aborting');
        sessionStorage.removeItem(storageKey); // allow retry next page load
        return;
      }

      // ── Attach listeners BEFORE requestPermissions / register ─────────────
      await Push.addListener('registration', function(evt) {
        var tokVal = evt && evt.value ? evt.value : '';
        var tokLen = tokVal.length;
        var tokPreview = tokLen > 14
          ? tokVal.slice(0, 8) + '\u2026' + tokVal.slice(-6)
          : tokVal.slice(0, 8) + '\u2026';
        console.log('[Push] registration event — token length:', tokLen, 'preview:', tokPreview);

        if (!tokVal) {
          console.warn('[Push] registration event: token.value empty — aborting POST');
          return;
        }
        if (!window.__USER__ || !window.__USER__.id) {
          console.warn('[Push] registration event: user no longer authenticated — aborting POST');
          return;
        }

        window.fetch('/api/push/register-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: tokVal, platform: 'ios' })
        }).then(function(res) {
          if (res.ok) {
            res.json().then(function(data) {
              console.log('[Push] POST /api/push/register-token → ' + res.status + ' OK — action:', data.action, 'token:', data.token_preview);
            }).catch(function() {
              console.log('[Push] POST /api/push/register-token → ' + res.status + ' OK');
            });
          } else {
            res.text().then(function(body) {
              console.warn('[Push] POST /api/push/register-token → ' + res.status + ' FAILED — body:', body.slice(0, 300));
            }).catch(function() {
              console.warn('[Push] POST /api/push/register-token → ' + res.status + ' FAILED — body unreadable');
            });
          }
        }).catch(function(err) {
          console.warn('[Push] POST /api/push/register-token fetch error:', err);
        });
      });
      console.log('[Push] registration listener attached');

      await Push.addListener('registrationError', function(err) {
        console.error('[Push] registrationError:', err && err.error ? err.error : JSON.stringify(err));
      });
      console.log('[Push] registrationError listener attached');

      await Push.addListener('pushNotificationReceived', function(notification) {
        console.log('[Push] foreground notification received:', JSON.stringify(notification));
      });
      console.log('[Push] pushNotificationReceived listener attached');

      // ── Request permission then register ──────────────────────────────────
      console.log('[Push] Calling requestPermissions()...');
      try {
        var permResult = await Push.requestPermissions();
        console.log('[Push] requestPermissions result:', JSON.stringify(permResult));
        if (permResult && permResult.receive === 'granted') {
          console.log('[Push] Permission granted — calling register()');
          try {
            await Push.register();
            console.log('[Push] register() called — awaiting registration event from APNs');
          } catch (regErr) {
            console.warn('[Push] register() threw:', regErr);
          }
        } else {
          var status = permResult ? permResult.receive : 'unknown';
          console.log('[Push] Permission NOT granted — receive status:', status);
        }
      } catch (permErr) {
        console.warn('[Push] requestPermissions() error:', permErr);
      }
    })();
  });
</script>
