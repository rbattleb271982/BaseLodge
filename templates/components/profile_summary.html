<div class="bl-card bl-profile-summary">
  <div class="profile-name">{{ user.first_name }} {{ user.last_name }}</div>
  <div class="profile-meta">{{ user.pass_type or 'No Pass' }} — {{ user.skill_level or 'Not Set' }} — {{ normalize_rider_type(user.rider_type) or 'Skier' }}</div>
  <div class="profile-mountains">{{ user.mountains_visited or 0 }} mountains visited</div>
</div>
