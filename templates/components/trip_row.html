<div class="bl-trip-card">
    <div style="flex: 1;">
        <p style="font-size: 0.9rem; font-weight: 500; margin: 0;">
            <strong>{{ format_trip_dates(trip) }}</strong> — 
            {% if trip.resort %}
                {{ trip.resort.name }} {{ trip.resort.state }}, {{ trip.resort.brand or 'No Pass' }}
            {% else %}
                {{ trip.mountain }} {{ trip.state }}, No Pass
            {% endif %}
            • {{ (trip.end_date - trip.start_date).days + 1 }} days
        </p>
    </div>
    <slot></slot>
</div>
