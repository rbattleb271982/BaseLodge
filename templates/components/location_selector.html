<style>
.bl-location-selector {
    position: relative;
    width: 100%;
}

.bl-location-input {
    width: 100%;
    padding: 12px 14px;
    padding-right: 36px;
    font-size: 15px;
    border: 1px solid var(--bl-color-border);
    border-radius: var(--bl-radius-md);
    background: var(--bl-color-surface);
    color: var(--bl-color-text);
    cursor: pointer;
}

.bl-location-input:focus {
    outline: none;
    border-color: var(--bl-color-primary);
}

.bl-location-input::placeholder {
    color: var(--bl-color-text-muted);
}

.bl-location-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 300px;
    overflow-y: auto;
    background: var(--bl-color-surface);
    border: 1px solid var(--bl-color-border);
    border-radius: var(--bl-radius-md);
    box-shadow: var(--bl-shadow-soft);
    z-index: 1000;
    margin-top: 4px;
}

.bl-location-dropdown.open {
    display: block;
}

.bl-location-group-header {
    padding: 10px 14px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--bl-color-text-muted);
    background: var(--bl-color-bg);
    position: sticky;
    top: 0;
}

.bl-location-option {
    padding: 10px 14px 10px 24px;
    font-size: 15px;
    color: var(--bl-color-text);
    cursor: pointer;
    transition: background 0.1s ease;
}

.bl-location-option:hover,
.bl-location-option.highlighted {
    background: var(--bl-color-bg);
}

.bl-location-option.hidden {
    display: none;
}

.bl-location-chevron {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--bl-color-text-muted);
}

.bl-location-no-results {
    padding: 14px;
    text-align: center;
    color: var(--bl-color-text-muted);
    font-size: 14px;
    display: none;
}

.bl-location-no-results.visible {
    display: block;
}
</style>

<script>
class LocationSelector {
    constructor(container, options = {}) {
        this.container = container;
        this.input = container.querySelector('.bl-location-input');
        this.dropdown = container.querySelector('.bl-location-dropdown');
        this.hiddenInput = container.querySelector('input[type="hidden"]');
        this.options = container.querySelectorAll('.bl-location-option');
        this.noResults = container.querySelector('.bl-location-no-results');
        this.highlightedIndex = -1;
        this.isOpen = false;
        this.onChange = options.onChange || (() => {});
        
        this.init();
    }
    
    init() {
        this.input.addEventListener('focus', () => this.open());
        this.input.addEventListener('input', () => this.filter());
        this.input.addEventListener('keydown', (e) => this.handleKeydown(e));
        
        this.options.forEach((option, index) => {
            option.addEventListener('click', () => this.select(option));
            option.addEventListener('mouseenter', () => this.highlight(index));
        });
        
        document.addEventListener('click', (e) => {
            if (!this.container.contains(e.target)) {
                this.close();
            }
        });
    }
    
    open() {
        this.isOpen = true;
        this.dropdown.classList.add('open');
        this.input.select();
    }
    
    close() {
        this.isOpen = false;
        this.dropdown.classList.remove('open');
        this.highlightedIndex = -1;
        this.clearHighlight();
        
        if (this.hiddenInput.value) {
            const selected = this.container.querySelector(`[data-value="${this.hiddenInput.value}"]`);
            if (selected) {
                this.input.value = selected.textContent.trim();
            }
        }
    }
    
    filter() {
        const query = this.input.value.toLowerCase().trim();
        let visibleCount = 0;
        const visibleGroups = new Set();
        
        this.options.forEach(option => {
            const text = option.textContent.toLowerCase();
            const matches = query === '' || text.includes(query);
            option.classList.toggle('hidden', !matches);
            if (matches) {
                visibleCount++;
                const group = option.dataset.group;
                if (group) visibleGroups.add(group);
            }
        });
        
        this.container.querySelectorAll('.bl-location-group-header').forEach(header => {
            header.style.display = visibleGroups.has(header.dataset.group) ? '' : 'none';
        });
        
        if (this.noResults) {
            this.noResults.classList.toggle('visible', visibleCount === 0 && query !== '');
        }
        
        this.highlightedIndex = -1;
        this.clearHighlight();
    }
    
    highlight(index) {
        this.clearHighlight();
        const visible = this.getVisibleOptions();
        if (index >= 0 && index < visible.length) {
            this.highlightedIndex = index;
            visible[index].classList.add('highlighted');
            visible[index].scrollIntoView({ block: 'nearest' });
        }
    }
    
    clearHighlight() {
        this.options.forEach(o => o.classList.remove('highlighted'));
    }
    
    getVisibleOptions() {
        return Array.from(this.options).filter(o => !o.classList.contains('hidden'));
    }
    
    handleKeydown(e) {
        const visible = this.getVisibleOptions();
        
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (!this.isOpen) this.open();
            this.highlight(Math.min(this.highlightedIndex + 1, visible.length - 1));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            this.highlight(Math.max(this.highlightedIndex - 1, 0));
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (this.highlightedIndex >= 0 && visible[this.highlightedIndex]) {
                this.select(visible[this.highlightedIndex]);
            }
        } else if (e.key === 'Escape') {
            this.close();
        }
    }
    
    select(option) {
        const value = option.dataset.value;
        const text = option.textContent.trim();
        
        this.hiddenInput.value = value;
        this.input.value = text;
        this.close();
        this.onChange(value, text);
        
        this.hiddenInput.dispatchEvent(new Event('change', { bubbles: true }));
    }
    
    setValue(value) {
        const option = this.container.querySelector(`[data-value="${value}"]`);
        if (option) {
            this.hiddenInput.value = value;
            this.input.value = option.textContent.trim();
        }
    }
    
    getValue() {
        return this.hiddenInput.value;
    }
}

function initLocationSelectors() {
    document.querySelectorAll('.bl-location-selector').forEach(container => {
        if (!container.dataset.initialized) {
            new LocationSelector(container);
            container.dataset.initialized = 'true';
        }
    });
}

document.addEventListener('DOMContentLoaded', initLocationSelectors);
</script>
