<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Connected</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-container" style="padding: var(--bl-space-8); max-width: 500px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: var(--bl-space-8);">
            <h2 style="font-size: 24px; font-weight: 700; color: var(--bl-color-text); margin-bottom: var(--bl-space-4);">You're now connected!</h2>
            <p style="font-size: 15px; color: var(--bl-color-text-muted);">You and {{ friend.first_name }} {{ friend.last_name }} are now friends on Base Lodge. You'll see each other's trips on your home screen.</p>
        </div>
        
        <a href="{{ url_for('home') }}" class="bl-btn-primary" style="width: 100%; display: block; text-align: center; text-decoration: none;">Go to Home</a>
    </div>
    {% include 'components/bottom_nav.html' %}
</body>
</html>
