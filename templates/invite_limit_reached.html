<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite limit reached — BaseLodge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .limit-info {
            background: var(--bl-color-surface);
            border: 1px solid var(--bl-color-border-soft);
            border-radius: var(--bl-radius-md);
            padding: 20px;
        }
        .limit-info-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--bl-color-text);
            margin: 0 0 8px 0;
        }
        .limit-info-desc {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            line-height: 1.55;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="page-container" style="padding: 24px 16px 88px;">
        <h1 class="page-title" style="margin-bottom: 16px;">Invite a friend</h1>

        <div class="limit-info">
            <p class="limit-info-title">Invite limit reached</p>
            <p class="limit-info-desc">You've reached the maximum number of invites for now. We'll open this up more soon.</p>
        </div>
    </div>

    {% include 'components/bottom_nav.html' %}
</body>
</html>
