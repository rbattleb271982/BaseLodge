<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="profile-page">
    <a href="{{ url_for('logout') }}" class="logout-icon" title="Log Out">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </a>
    
    <div class="profile-container">
        <div class="auth-card" style="margin-bottom: 12px;">
            <a href="{{ url_for('profile') }}" class="link-button">← Back to Home</a>
        </div>

        <div class="auth-card profile-card">
            <h1 class="auth-title" id="display-name">{{ user.first_name }} {{ user.last_name }}</h1>
            
            <div class="profile-info">
                <div class="profile-field">
                    <label>Name</label>
                    <div class="field-display" onclick="enableEdit(this)">
                        <span id="name-display">{{ user.first_name }} {{ user.last_name }}</span>
                        <input type="text" id="first_name" placeholder="First name" class="hidden">
                        <input type="text" id="last_name" placeholder="Last name" class="hidden">
                    </div>
                </div>
                
                <div class="profile-field">
                    <label>Rider Type</label>
                    <div class="field-display" onclick="enableEdit(this)">
                        <span id="rider-display">{{ user.rider_type or 'Not specified' }}</span>
                        <select id="rider_type" class="hidden">
                            <option value="">Select...</option>
                            <option value="Skier">Skier</option>
                            <option value="Snowboarder">Snowboarder</option>
                            <option value="Both">Both</option>
                        </select>
                    </div>
                </div>
                
                <div class="profile-field">
                    <label>Pass Type</label>
                    <div class="field-display" onclick="enableEdit(this)">
                        <span id="pass-display">{{ user.pass_type or 'No Pass' }}</span>
                        <select id="pass_type" class="hidden">
                            <option value="">Select...</option>
                            {% for pass_opt in pass_options %}
                            <option value="{{ pass_opt }}">{{ pass_opt }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="profile-field read-only">
                    <label>Friends</label>
                    <div>{{ friends_count }} friend{{ 's' if friends_count != 1 else '' }}</div>
                </div>
            </div>
            
            <div class="profile-actions">
                <a href="{{ url_for('friends') }}" class="auth-button">View Friends</a>
                <button id="copy-invite-btn" class="auth-button secondary" onclick="copyInviteLink()">Invite a Friend</button>
            </div>
        </div>
    </div>
    
    <script>
        function copyInviteLink() {
            const currentUserId = {{ user.id }};
            const inviteUrl = `${window.location.origin}/auth?ref=${currentUserId}`;
            navigator.clipboard.writeText(inviteUrl).then(() => {
                alert('Invite link copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy link');
            });
        }
        
        function enableEdit(element) {
            const field = element.parentElement;
            const display = element.querySelector('span');
            const inputs = element.querySelectorAll('input, select');
            
            if (display.style.display === 'none') return;
            
            display.style.display = 'none';
            inputs.forEach(input => input.classList.remove('hidden'));
            
            if (field.id === 'name-field') {
                document.getElementById('first_name').value = '{{ user.first_name }}';
                document.getElementById('last_name').value = '{{ user.last_name }}';
            }
            
            const updateBtn = document.createElement('button');
            updateBtn.type = 'button';
            updateBtn.className = 'auth-button';
            updateBtn.textContent = 'Save';
            updateBtn.onclick = () => saveProfileField(field);
            
            field.appendChild(updateBtn);
        }
        
        function saveProfileField(field) {
            const data = {};
            const inputs = field.querySelectorAll('input:not(.hidden), select:not(.hidden)');
            inputs.forEach(input => {
                if (input.id) data[input.id] = input.value;
            });
            
            fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => res.json()).then(result => {
                if (result.success) {
                    location.reload();
                } else {
                    alert(result.error || 'Failed to update');
                }
            });
        }
    </script>
</body>
</html>
