<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="profile-page">
    <a href="{{ url_for('logout') }}" class="logout-icon" title="Log Out">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </a>
    
    <div class="profile-container">
        <div class="auth-card profile-card">
            <h1 class="auth-title">Edit Profile</h1>

            <form method="POST" action="{{ url_for('edit_profile') }}" class="auth-form">
                <div class="form-row">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="auth-select">
                        <option value="" {% if not user.gender %}selected{% endif %}>Select</option>
                        <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Non-binary" {% if user.gender == 'Non-binary' %}selected{% endif %}>Non-binary</option>
                        <option value="Prefer not to say" {% if user.gender == 'Prefer not to say' %}selected{% endif %}>Prefer not to say</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="birth_year">Birth Year</label>
                    <input
                        type="number"
                        id="birth_year"
                        name="birth_year"
                        min="1900"
                        max="2100"
                        value="{{ user.birth_year or '' }}"
                    >
                </div>

                <div class="form-row">
                    <label for="rider_type">Rider Type</label>
                    <select id="rider_type" name="rider_type" class="auth-select">
                        <option value="" {% if not user.rider_type %}selected{% endif %}>Select</option>
                        <option value="Skier" {% if user.rider_type == 'Skier' %}selected{% endif %}>Skier</option>
                        <option value="Snowboarder" {% if user.rider_type == 'Snowboarder' %}selected{% endif %}>Snowboarder</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="pass_type">Pass Type</label>
                    <select id="pass_type" name="pass_type" class="auth-select">
                        <option value="" {% if not user.pass_type %}selected{% endif %}>Select</option>
                        <option value="Epic" {% if user.pass_type == 'Epic' %}selected{% endif %}>Epic</option>
                        <option value="Ikon" {% if user.pass_type == 'Ikon' %}selected{% endif %}>Ikon</option>
                        <option value="Indy" {% if user.pass_type == 'Indy' %}selected{% endif %}>Indy</option>
                        <option value="Other" {% if user.pass_type == 'Other' %}selected{% endif %}>Other</option>
                        <option value="None" {% if user.pass_type == 'None' %}selected{% endif %}>None</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="home_state">Home State</label>
                    <input
                        type="text"
                        id="home_state"
                        name="home_state"
                        value="{{ user.home_state or '' }}"
                        placeholder="e.g., Colorado"
                    >
                </div>

                <div class="form-row">
                    <label for="skill_level">Skill Level</label>
                    <select id="skill_level" name="skill_level" class="auth-select">
                        <option value="" {% if not user.skill_level %}selected{% endif %}>Select</option>
                        <option value="Beginner" {% if user.skill_level == 'Beginner' %}selected{% endif %}>Beginner</option>
                        <option value="Intermediate" {% if user.skill_level == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                        <option value="Advanced" {% if user.skill_level == 'Advanced' %}selected{% endif %}>Advanced</option>
                        <option value="Expert" {% if user.skill_level == 'Expert' %}selected{% endif %}>Expert</option>
                    </select>
                </div>

                <button type="submit" class="auth-button">Save Changes</button>
                <a href="{{ url_for('profile') }}" class="link-button" style="display: block; text-align: center; margin-top: 12px;">← Back to Profile</a>
            </form>
        </div>
    </div>
</body>
</html>
