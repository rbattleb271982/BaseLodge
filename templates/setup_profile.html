<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Setup Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Welcome, {{ user.first_name }}!</h1>
        <p class="auth-subtitle">Let's personalize your experience.</p>
        
        {% if step == "1" %}
        <form class="auth-form" method="POST" action="{{ url_for('setup_profile', step='1') }}">
            <div class="form-row">
                <label>What best describes you?</label>
                <div class="segmented-control">
                    <button type="button" class="rider-btn" data-value="Skier">Skier</button>
                    <button type="button" class="rider-btn" data-value="Snowboarder">Snowboarder</button>
                </div>
                <input type="hidden" id="rider_type" name="rider_type" required>
            </div>
            <button type="submit" class="auth-button">Next</button>
        </form>
        {% elif step == "2" %}
        <form class="auth-form" method="POST" action="{{ url_for('setup_profile', step='2') }}">
            <div class="form-row">
                <label>What pass do you have?</label>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 8px;">
                    <button type="button" class="pass-btn" data-value="Epic">Epic</button>
                    <button type="button" class="pass-btn" data-value="Ikon">Ikon</button>
                    <button type="button" class="pass-btn" data-value="Epic Local">Epic Local</button>
                    <button type="button" class="pass-btn" data-value="Ikon Base">Ikon Base</button>
                    <button type="button" class="pass-btn" data-value="Epic & Ikon">Epic & Ikon</button>
                    <button type="button" class="pass-btn" data-value="Loveland">Loveland</button>
                    <button type="button" class="pass-btn" data-value="Other">Other</button>
                    <button type="button" class="pass-btn" data-value="No Pass">No Pass</button>
                </div>
                <input type="hidden" id="pass_type" name="pass_type" required>
            </div>
            <button type="submit" class="auth-button">Complete Setup</button>
        </form>
        {% endif %}
        
        <script>
        {% if step == "1" %}
        const riderBtns = document.querySelectorAll('.rider-btn');
        const riderInput = document.getElementById('rider_type');
        
        riderBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                riderBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                riderInput.value = btn.dataset.value;
            });
        });
        {% elif step == "2" %}
        const passBtns = document.querySelectorAll('.pass-btn');
        const passInput = document.getElementById('pass_type');
        
        passBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                passBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                passInput.value = btn.dataset.value;
            });
        });
        {% endif %}
        </script>
        
        <div class="auth-helper">
            <span class="step-indicator">Step {{ step }} of 2</span>
        </div>
    </div>
</body>
</html>
