<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseLodge - Setup Profile</title>
    {% include 'components/analytics_head.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .setup-section {
            margin-bottom: var(--bl-space-6);
        }

        .setup-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--bl-color-text);
            margin-bottom: var(--bl-space-2);
        }

        .setup-hint {
            font-size: 12px;
            color: var(--bl-color-text-muted);
            margin: 0 0 var(--bl-space-3) 0;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--bl-color-border-soft);
        }

        .checkbox-item:last-child {
            border-bottom: none;
        }

        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--bl-color-primary);
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            margin: 0;
            color: var(--bl-color-text);
        }

        .form-submit {
            width: 100%;
            margin-top: var(--bl-space-4);
        }

        .form-submit:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">BaseLodge</h1>
                <p class="auth-subtitle">Tell us a bit about yourself to get started.</p>
            </div>

            <form method="POST" action="{{ url_for('setup_profile') }}" id="setup-form">
                <div class="setup-section">
                    <label class="setup-label">Rider type</label>
                    <p class="setup-hint">Select all that apply.</p>
                    <div class="checkbox-group" id="rider-types-group">
                        {% for rider_type in rider_types %}
                        <div class="checkbox-item">
                            <input type="checkbox" name="rider_types" value="{{ rider_type }}" id="rider_{{ loop.index }}">
                            <label for="rider_{{ loop.index }}">{{ rider_type }}</label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="setup-section">
                    <label class="setup-label">Which passes do you have?</label>
                    <p class="setup-hint">Select all that apply.</p>
                    <div class="checkbox-group">
                        {% for pass in pass_options %}
                        <div class="checkbox-item">
                            <input type="checkbox" name="pass_type" value="{{ pass }}" id="pass_{{ pass }}">
                            <label for="pass_{{ pass }}">{{ pass.replace('Mountain', 'Mountain ').replace('Collective', 'Collective').replace('PowderAlliance', 'Powder Alliance').replace('SkiCalifornia', 'Ski California') }}</label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <button type="submit" class="bl-btn-primary form-submit" id="continue-btn" disabled>Continue</button>

                <p class="auth-footer">You can change these later in your profile.</p>
            </form>
        </div>
    </div>

    <script>
        const riderTypeCheckboxes = document.querySelectorAll('input[name="rider_types"]');
        const passCheckboxes = document.querySelectorAll('input[name="pass_type"]');
        const continueBtn = document.getElementById('continue-btn');

        function updateContinueButton() {
            const riderSelected = Array.from(riderTypeCheckboxes).some(cb => cb.checked);
            const passSelected = Array.from(passCheckboxes).some(cb => cb.checked);
            continueBtn.disabled = !(riderSelected && passSelected);
        }

        riderTypeCheckboxes.forEach(checkbox => {
            checkbox.addEventListener('change', updateContinueButton);
        });

        passCheckboxes.forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (this.value === "I don't have a pass" && this.checked) {
                    passCheckboxes.forEach(cb => {
                        if (cb.value !== "I don't have a pass") {
                            cb.checked = false;
                        }
                    });
                }
                if (this.value !== "I don't have a pass" && this.checked) {
                    const noPassCheckbox = document.getElementById("pass_I don't have a pass");
                    if (noPassCheckbox) noPassCheckbox.checked = false;
                }
                updateContinueButton();
            });
        });

        document.getElementById('setup-form').addEventListener('submit', (e) => {
            const selectedRiders = Array.from(riderTypeCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            const selectedPasses = Array.from(passCheckboxes).filter(cb => cb.checked).map(cb => cb.value);

            if (selectedRiders.length === 0) {
                e.preventDefault();
                alert('Please select at least one rider type.');
                return;
            }
            if (!selectedPasses.length) {
                e.preventDefault();
                alert('Please select at least one pass.');
            }
        });

        updateContinueButton();
    </script>
</body>
</html>
