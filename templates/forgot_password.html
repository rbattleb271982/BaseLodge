<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bl-color-bg);
            padding: var(--bl-space-6);
        }
        
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--bl-color-surface);
            border-radius: var(--bl-radius-lg);
            border: 1px solid var(--bl-color-border-soft);
            box-shadow: var(--bl-shadow-soft);
            padding: var(--bl-space-8);
        }
        
        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--bl-color-primary);
            margin-bottom: var(--bl-space-4);
            text-align: center;
        }

        .form-group {
            margin-bottom: var(--bl-space-6);
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--bl-color-text);
            margin-bottom: var(--bl-space-3);
        }
        
        .form-input {
            width: 100%;
            padding: var(--bl-space-4) var(--bl-space-5);
            font-size: 15px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            background: var(--bl-color-surface);
            color: var(--bl-color-text);
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Forgot Password</h2>
            <p style="margin-bottom: 24px; color: var(--bl-color-text-muted); font-size: 14px; text-align: center; line-height: 1.5;">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="background: #e3f2fd; color: #0d47a1; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com" autocomplete="email">
                </div>
                
                <button type="submit" class="bl-btn-primary" style="width: 100%; margin-bottom: 16px;">
                    Send Reset Link
                </button>
            </form>
            
            <div style="text-align: center;">
                <a href="{{ url_for('auth') }}" style="color: var(--bl-color-primary); text-decoration: none; font-size: 14px; font-weight: 500;">Back to Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
