{% extends "base_app.html" %}
{% block title %}Mountains — BaseLodge{% endblock %}
{% block head %}
<style>
    .mt-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px calc(80px + env(safe-area-inset-bottom, 0px));
        text-align: center;
    }
    .mt-icon {
        width: 48px;
        height: 48px;
        color: var(--bl-color-text-muted);
        margin-bottom: 20px;
        opacity: 0.45;
    }
    .mt-heading {
        font-family: var(--bl-font-serif, Georgia, serif);
        font-size: 28px;
        font-weight: 400;
        color: var(--bl-color-text);
        letter-spacing: -0.3px;
        margin: 0 0 10px;
    }
    .mt-sub {
        font-size: 15px;
        color: var(--bl-color-text-muted);
        line-height: 1.5;
        margin: 0;
    }
</style>
{% endblock %}
{% block content %}
<div class="page-container mt-page">
    <svg class="mt-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 20l5.5-9L12 16l3.5-6L22 20H3z" />
    </svg>
    <h1 class="mt-heading">Mountains</h1>
    <p class="mt-sub">Mountain discovery coming soon.</p>
</div>
{% endblock %}
