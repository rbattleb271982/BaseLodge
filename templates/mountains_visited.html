<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Mountains Visited</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mountain-search {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            margin-bottom: var(--bl-space-4);
            min-height: 48px;
            box-sizing: border-box;
        }
        
        .selected-counter {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains-wrapper {
            position: relative;
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bl-space-3);
            max-height: 120px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        
        .selected-mountains.expanded {
            max-height: none;
        }
        
        .selected-mountains-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: linear-gradient(transparent, var(--bl-color-bg));
            pointer-events: none;
        }
        
        .selected-mountains-wrapper.expanded .selected-mountains-fade {
            display: none;
        }
        
        .expand-toggle {
            font-size: 13px;
            color: var(--bl-color-primary);
            background: none;
            border: none;
            padding: 8px 0 0 0;
            cursor: pointer;
            font-weight: 500;
        }
        
        .expand-toggle:hover {
            text-decoration: underline;
        }
        
        .mountain-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bl-color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .mountain-pill .remove-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        
        .mountain-pill .remove-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .selected-mountains:empty {
            display: none;
        }
        
        .mountain-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bl-color-border);
            font-size: 15px;
            cursor: pointer;
        }
        
        .mountain-row input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .mountain-row.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="bl-header"><a href="{{ url_for('home') }}">Base Lodge</a></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <a href="{{ url_for('settings') }}" style="color: var(--bl-color-text-muted); text-decoration: none; font-size: 16px;">← Back</a>
            <button type="submit" form="mountains-form" class="bl-btn-primary" style="padding: 10px 20px; font-size: 15px;">Save</button>
        </div>
        <h1 class="page-title" style="margin-bottom: 8px;">Mountains Visited</h1>
        <p style="font-size: 14px; color: var(--bl-color-text-muted); margin: 0 0 16px 0;">These are mountains you've already skied.</p>
        
        <form method="POST" id="mountains-form">
            <select id="state-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByState()">
                <option value="all">All states</option>
                {% for state in states %}
                <option value="{{ state }}">{{ state }}</option>
                {% endfor %}
            </select>
            
            <input type="text" class="mountain-search" id="mountain-search" placeholder="Search mountains..." oninput="filterMountains()">
            
            <div class="selected-counter">
                <span id="count-display">{{ mountains_visited_count }} selected</span>
            </div>
            
            <div class="selected-mountains-wrapper" id="selected-wrapper">
                <div class="selected-mountains" id="selected-pills">
                    {% for m in selected_mountains %}
                    <span class="mountain-pill" data-mountain="{{ m }}">
                        {{ m }}
                        <button type="button" class="remove-btn" onclick="removeMountain('{{ m }}')" aria-label="Remove {{ m }}">✕</button>
                    </span>
                    {% endfor %}
                </div>
                <div class="selected-mountains-fade" id="selected-fade"></div>
                <button type="button" class="expand-toggle" id="expand-toggle" style="display: none;" onclick="toggleExpand()">
                    View all selected (<span id="expand-count">0</span>)
                </button>
            </div>
            
            <div class="mountain-list" id="mountain-list">
                {% for mountain in all_mountains %}
                <label class="mountain-row" data-mountain="{{ mountain.lower() }}" data-state="{{ mountains_with_state.get(mountain, '') }}">
                    <input type="checkbox" name="mountains" value="{{ mountain }}"
                           {% if mountain in selected_mountains %}checked{% endif %} onchange="updatePills()">
                    {{ mountain }}
                </label>
                {% endfor %}
            </div>
            
        </form>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const selectedMountains = {{ selected_mountains | tojson }};
        let currentStateFilter = 'all';
        
        function filterByState() {
            currentStateFilter = document.getElementById('state-filter').value;
            filterMountains();
        }
        
        function filterMountains() {
            const searchTerm = document.getElementById('mountain-search').value.toLowerCase();
            const rows = document.querySelectorAll('.mountain-row');
            
            rows.forEach(row => {
                const mountain = row.getAttribute('data-mountain');
                const state = row.getAttribute('data-state');
                const matchesSearch = mountain.includes(searchTerm);
                const matchesState = currentStateFilter === 'all' || state === currentStateFilter;
                
                if (matchesSearch && matchesState) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }
        
        function removeMountain(mountainName) {
            // Find and uncheck the checkbox
            const checkboxes = document.querySelectorAll('input[name="mountains"]');
            checkboxes.forEach(cb => {
                if (cb.value === mountainName) {
                    cb.checked = false;
                }
            });
            // Refresh pills
            updatePills();
        }
        
        let isExpanded = false;
        
        function updatePills() {
            const checks = document.querySelectorAll('input[name="mountains"]:checked');
            const pillsContainer = document.getElementById('selected-pills');
            const countDisplay = document.getElementById('count-display');
            
            const selected = Array.from(checks).map(c => c.value);
            countDisplay.textContent = selected.length + ' selected';
            
            pillsContainer.innerHTML = '';
            selected.forEach(m => {
                const pill = document.createElement('span');
                pill.className = 'mountain-pill';
                pill.setAttribute('data-mountain', m);
                
                const text = document.createTextNode(m + ' ');
                pill.appendChild(text);
                
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'remove-btn';
                removeBtn.setAttribute('aria-label', 'Remove ' + m);
                removeBtn.textContent = '✕';
                removeBtn.onclick = function() { removeMountain(m); };
                pill.appendChild(removeBtn);
                
                pillsContainer.appendChild(pill);
            });
            
            updateExpandToggle(selected.length);
        }
        
        function updateExpandToggle(count) {
            const pillsContainer = document.getElementById('selected-pills');
            const expandToggle = document.getElementById('expand-toggle');
            const expandCount = document.getElementById('expand-count');
            const fade = document.getElementById('selected-fade');
            
            // Check if content overflows
            const isOverflowing = pillsContainer.scrollHeight > pillsContainer.clientHeight;
            
            if (count > 0 && (isOverflowing || isExpanded)) {
                expandToggle.style.display = 'block';
                expandCount.textContent = count;
                fade.style.display = isExpanded ? 'none' : 'block';
            } else {
                expandToggle.style.display = 'none';
                fade.style.display = 'none';
            }
        }
        
        function toggleExpand() {
            const wrapper = document.getElementById('selected-wrapper');
            const pillsContainer = document.getElementById('selected-pills');
            const expandToggle = document.getElementById('expand-toggle');
            const fade = document.getElementById('selected-fade');
            
            isExpanded = !isExpanded;
            
            if (isExpanded) {
                wrapper.classList.add('expanded');
                pillsContainer.classList.add('expanded');
                expandToggle.innerHTML = 'Collapse';
                fade.style.display = 'none';
            } else {
                wrapper.classList.remove('expanded');
                pillsContainer.classList.remove('expanded');
                const count = document.querySelectorAll('input[name="mountains"]:checked').length;
                expandToggle.innerHTML = 'View all selected (<span id="expand-count">' + count + '</span>)';
                fade.style.display = 'block';
            }
        }
        
        // Check overflow on initial load
        document.addEventListener('DOMContentLoaded', function() {
            const count = document.querySelectorAll('input[name="mountains"]:checked').length;
            setTimeout(() => updateExpandToggle(count), 100);
        });
    </script>
</body>
</html>
