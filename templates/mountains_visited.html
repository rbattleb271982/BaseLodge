<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Mountains Visited</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mountain-search {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 15px;
            margin-bottom: var(--bl-space-4);
        }
        
        .selected-counter {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bl-space-3);
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bl-color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .mountain-pill .remove-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        
        .mountain-pill .remove-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .selected-mountains:empty {
            display: none;
        }
        
        .mountain-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bl-color-border);
            font-size: 14px;
            cursor: pointer;
        }
        
        .mountain-row input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .mountain-row.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="bl-header"><a href="{{ url_for('home') }}">Base Lodge</a></div>
        <a href="{{ url_for('settings') }}" style="display: inline-block; margin-bottom: 16px; color: var(--bl-color-text-muted); text-decoration: none; font-size: 16px;">← Back</a>
        <h1 class="page-title">Mountains Visited</h1>
        
        <form method="POST">
            <select id="state-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByState()">
                <option value="all">All states</option>
                {% for state in states %}
                <option value="{{ state }}">{{ state }}</option>
                {% endfor %}
            </select>
            
            <input type="text" class="mountain-search" id="mountain-search" placeholder="Search mountains..." oninput="filterMountains()">
            
            <div class="selected-counter">
                <span id="count-display">{{ mountains_visited_count }} selected</span>
            </div>
            
            <div class="selected-mountains" id="selected-pills">
                {% for m in selected_mountains %}
                <span class="mountain-pill" data-mountain="{{ m }}">
                    {{ m }}
                    <button type="button" class="remove-btn" onclick="removeMountain('{{ m }}')" aria-label="Remove {{ m }}">✕</button>
                </span>
                {% endfor %}
            </div>
            
            <div class="mountain-list" id="mountain-list">
                {% for mountain in all_mountains %}
                <label class="mountain-row" data-mountain="{{ mountain.lower() }}" data-state="{{ mountains_with_state.get(mountain, '') }}">
                    <input type="checkbox" name="mountains" value="{{ mountain }}"
                           {% if mountain in selected_mountains %}checked{% endif %} onchange="updatePills()">
                    {{ mountain }}
                </label>
                {% endfor %}
            </div>
            
            <button type="submit" class="bl-btn-primary" style="width: 100%;">Save</button>
        </form>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const selectedMountains = {{ selected_mountains | tojson }};
        let currentStateFilter = 'all';
        
        function filterByState() {
            currentStateFilter = document.getElementById('state-filter').value;
            filterMountains();
        }
        
        function filterMountains() {
            const searchTerm = document.getElementById('mountain-search').value.toLowerCase();
            const rows = document.querySelectorAll('.mountain-row');
            
            rows.forEach(row => {
                const mountain = row.getAttribute('data-mountain');
                const state = row.getAttribute('data-state');
                const matchesSearch = mountain.includes(searchTerm);
                const matchesState = currentStateFilter === 'all' || state === currentStateFilter;
                
                if (matchesSearch && matchesState) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }
        
        function removeMountain(mountainName) {
            // Find and uncheck the checkbox
            const checkboxes = document.querySelectorAll('input[name="mountains"]');
            checkboxes.forEach(cb => {
                if (cb.value === mountainName) {
                    cb.checked = false;
                }
            });
            // Refresh pills
            updatePills();
        }
        
        function updatePills() {
            const checks = document.querySelectorAll('input[name="mountains"]:checked');
            const pillsContainer = document.getElementById('selected-pills');
            const countDisplay = document.getElementById('count-display');
            
            const selected = Array.from(checks).map(c => c.value);
            countDisplay.textContent = selected.length + ' selected';
            
            pillsContainer.innerHTML = '';
            selected.forEach(m => {
                const pill = document.createElement('span');
                pill.className = 'mountain-pill';
                pill.setAttribute('data-mountain', m);
                
                const text = document.createTextNode(m + ' ');
                pill.appendChild(text);
                
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'remove-btn';
                removeBtn.setAttribute('aria-label', 'Remove ' + m);
                removeBtn.textContent = '✕';
                removeBtn.onclick = function() { removeMountain(m); };
                pill.appendChild(removeBtn);
                
                pillsContainer.appendChild(pill);
            });
        }
    </script>
</body>
</html>
