<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Mountains Visited</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mountains-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: var(--bl-space-6);
        }
        
        .mountain-option {
            display: flex;
            align-items: center;
            padding: 10px 0;
        }
        
        .mountain-option input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
        }
        
        .selected-mountains {
            margin-bottom: var(--bl-space-6);
            font-size: 14px;
            color: var(--bl-color-text-muted);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Mountains Visited</h1>
        
        {% if mountains_visited_count > 0 %}
        <div class="selected-mountains">
            You've visited: {{ selected_mountains | join(' • ') }}
        </div>
        {% else %}
        <div class="selected-mountains">
            You've visited: 0 mountains
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="state-select" class="form-label">State</label>
                <select name="state" id="state-select" onchange="updateMountains()" style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md); font-size: 15px; margin-bottom: var(--bl-space-6);">
                    <option value="">Select a state</option>
                    {% for state in mountains_by_state.keys() | sort %}
                    <option value="{{ state }}">{{ state }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="mountain-search" class="form-label">Search mountains</label>
                <input type="search" id="mountain-search" placeholder="Search within selected state..." style="width: 100%; padding: 10px; border: 1px solid var(--bl-color-border); border-radius: var(--bl-radius-md); font-size: 15px; margin-bottom: var(--bl-space-6);" oninput="filterMountains()">
            </div>
            
            <div class="mountains-list" id="mountains-container"></div>
            
            <button type="submit" class="bl-btn-primary" style="width: 100%; margin-top: var(--bl-space-6);">Save</button>
        </form>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const mountainsByState = {{ mountains_by_state | tojson }};
        const selectedMountains = {{ selected_mountains | tojson }};
        
        function updateMountains() {
            const state = document.getElementById('state-select').value;
            const container = document.getElementById('mountains-container');
            container.innerHTML = '';
            
            if (!state || !mountainsByState[state]) {
                return;
            }
            
            const mountains = mountainsByState[state].sort();
            mountains.forEach(mountain => {
                const isChecked = selectedMountains.includes(mountain);
                const label = document.createElement('label');
                label.className = 'mountain-option';
                label.setAttribute('data-mountain-name', mountain.toLowerCase());
                label.innerHTML = `
                    <input type="checkbox" name="mountains" value="${mountain}" ${isChecked ? 'checked' : ''} />
                    ${mountain}
                `;
                container.appendChild(label);
            });
            filterMountains();
        }
        
        function filterMountains() {
            const searchInput = document.getElementById('mountain-search');
            const searchTerm = searchInput.value.toLowerCase();
            const labels = document.querySelectorAll('.mountain-option');
            
            labels.forEach(label => {
                const mountainName = label.getAttribute('data-mountain-name');
                if (mountainName.includes(searchTerm)) {
                    label.style.display = 'flex';
                } else {
                    label.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
