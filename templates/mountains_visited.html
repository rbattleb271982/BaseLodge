<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Mountains Visited</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .filter-row {
            display: flex;
            gap: var(--bl-space-3);
            margin-bottom: var(--bl-space-4);
        }
        
        .filter-row select {
            flex: 1;
            padding: 14px 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            min-height: 48px;
            box-sizing: border-box;
            background-color: var(--bl-color-bg);
            color: var(--bl-color-text);
        }
        
        .filter-row select:disabled {
            background-color: var(--bl-color-bg-secondary);
            color: var(--bl-color-text-muted);
            cursor: not-allowed;
            opacity: 1;
        }
        
        @media (prefers-color-scheme: dark) {
            .filter-row select {
                background-color: #1c1c1e;
                color: #ffffff;
                border-color: #2c2c2e;
            }
            
            .filter-row select:disabled {
                background-color: #141416;
                color: #6e6e73;
                border-color: #2c2c2e;
                opacity: 1;
            }
            
            .mountain-search {
                background-color: #1c1c1e;
                color: #ffffff;
                border-color: #2c2c2e;
            }
            
            .mountain-search::placeholder {
                color: #6e6e73;
            }
        }
        
        .mountain-search {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 16px;
            margin-bottom: var(--bl-space-4);
            min-height: 48px;
            box-sizing: border-box;
        }
        
        .mountain-search:disabled {
            background: var(--bl-color-bg-secondary);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .selected-counter {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains-wrapper {
            position: relative;
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bl-space-3);
            max-height: 120px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        
        .selected-mountains.expanded {
            max-height: none;
        }
        
        .selected-mountains-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: linear-gradient(transparent, var(--bl-color-bg));
            pointer-events: none;
        }
        
        .selected-mountains-wrapper.expanded .selected-mountains-fade {
            display: none;
        }
        
        .expand-toggle {
            font-size: 13px;
            color: var(--bl-color-primary);
            background: none;
            border: none;
            padding: 8px 0 0 0;
            cursor: pointer;
            font-weight: 500;
        }
        
        .expand-toggle:hover {
            text-decoration: underline;
        }
        
        .mountain-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bl-color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .mountain-pill .remove-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        
        .mountain-pill .remove-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .selected-mountains:empty {
            display: none;
        }
        
        .mountain-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bl-color-border);
            font-size: 15px;
            cursor: pointer;
        }
        
        .mountain-row input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .mountain-row.hidden {
            display: none;
        }
        
        .resort-location {
            color: var(--bl-color-text-muted);
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="bl-header"><a href="{{ url_for('home') }}">Base Lodge</a></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <a href="{{ url_for('settings') }}" style="color: var(--bl-color-text-muted); text-decoration: none; font-size: 16px;">← Back</a>
            <button type="submit" form="mountains-form" class="bl-btn-primary" style="padding: 10px 20px; font-size: 15px;">Save</button>
        </div>
        <h1 class="page-title" id="visited-mountains" style="margin-bottom: 8px;">Mountains Visited</h1>
        <p style="font-size: 14px; color: var(--bl-color-text-muted); margin: 0 0 16px 0;">These are mountains you've already skied.</p>
        
        <form method="POST" id="mountains-form">
            <div class="filter-row">
                <select id="country-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByCountry()">
                    <option value="all">All countries</option>
                    {% for country in countries %}
                    <option value="{{ country.code }}">{{ country.name }}</option>
                    {% endfor %}
                </select>
                
                <select id="region-filter" class="mountain-search" style="cursor: pointer;" onchange="filterByRegion()" disabled>
                    <option value="all">State / Province / Region</option>
                </select>
            </div>
            
            <input type="text" class="mountain-search" id="mountain-search" placeholder="Search mountains..." oninput="filterResorts()">
            
            <div class="selected-counter">
                <span id="count-display">{{ mountains_visited_count }} selected</span>
            </div>
            
            <div class="selected-mountains-wrapper" id="selected-wrapper">
                <div class="selected-mountains" id="selected-pills">
                    {% for resort in selected_resorts %}
                    <span class="mountain-pill" data-id="{{ resort.id }}">
                        {{ resort.name }}
                        <button type="button" class="remove-btn" onclick="removeResort({{ resort.id }})" aria-label="Remove {{ resort.name }}">✕</button>
                    </span>
                    {% endfor %}
                </div>
                <div class="selected-mountains-fade" id="selected-fade"></div>
                <button type="button" class="expand-toggle" id="expand-toggle" style="display: none;" onclick="toggleExpand()">
                    View all selected (<span id="expand-count">{{ mountains_visited_count }}</span>)
                </button>
            </div>
            
            <div class="mountain-list" id="mountain-list">
                {% for resort in resorts %}
                <label class="mountain-row" 
                       data-id="{{ resort.id }}"
                       data-name="{{ resort.name|lower }}"
                       data-display-name="{{ resort.name }}"
                       data-country="{{ resort.country_code }}"
                       data-region="{{ resort.state_code }}">
                    <input type="checkbox" name="resort_ids" value="{{ resort.id }}"
                           {% if resort.id in selected_resort_ids %}checked{% endif %} onchange="updatePills()">
                    {{ resort.name }} <span class="resort-location">{{ resort.state_code }}</span>
                </label>
                {% endfor %}
            </div>
            
        </form>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const selectedResortIds = new Set({{ selected_resort_ids | tojson }});
        let currentCountryFilter = 'all';
        let currentRegionFilter = 'all';
        
        // Initialize expand toggle on load (pills are server-rendered)
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => updateExpandToggle(selectedResortIds.size), 100);
        });
        
        async function filterByCountry() {
            currentCountryFilter = document.getElementById('country-filter').value;
            const regionSelect = document.getElementById('region-filter');
            
            // Reset region filter
            currentRegionFilter = 'all';
            regionSelect.innerHTML = '<option value="all">State / Province / Region</option>';
            
            if (currentCountryFilter === 'all') {
                regionSelect.disabled = true;
            } else {
                // Fetch regions for this country
                try {
                    const response = await fetch(`/api/resort-regions/${currentCountryFilter}`);
                    const regions = await response.json();
                    
                    regions.forEach(region => {
                        const option = document.createElement('option');
                        option.value = region;
                        option.textContent = region;
                        regionSelect.appendChild(option);
                    });
                    
                    regionSelect.disabled = false;
                } catch (error) {
                    console.error('Failed to load regions:', error);
                    regionSelect.disabled = true;
                }
            }
            
            filterResorts();
        }
        
        function filterByRegion() {
            currentRegionFilter = document.getElementById('region-filter').value;
            filterResorts();
        }
        
        function filterResorts() {
            const searchTerm = document.getElementById('mountain-search').value.toLowerCase();
            const rows = document.querySelectorAll('.mountain-row');
            
            rows.forEach(row => {
                const name = row.dataset.name;
                const country = row.dataset.country;
                const region = row.dataset.region;
                
                const matchesSearch = name.includes(searchTerm);
                const matchesCountry = currentCountryFilter === 'all' || country === currentCountryFilter;
                const matchesRegion = currentRegionFilter === 'all' || region === currentRegionFilter;
                
                if (matchesSearch && matchesCountry && matchesRegion) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }
        
        function removeResort(id) {
            selectedResortIds.delete(id);
            const checkbox = document.querySelector(`input[value="${id}"]`);
            if (checkbox) checkbox.checked = false;
            updatePills();
        }
        
        let isExpanded = false;
        
        function updatePills() {
            const checks = document.querySelectorAll('input[name="resort_ids"]:checked');
            const pillsContainer = document.getElementById('selected-pills');
            const countDisplay = document.getElementById('count-display');
            
            // Sync selectedResortIds with checkboxes
            selectedResortIds.clear();
            checks.forEach(cb => selectedResortIds.add(parseInt(cb.value)));
            
            countDisplay.textContent = selectedResortIds.size + ' selected';
            
            pillsContainer.innerHTML = '';
            checks.forEach(cb => {
                const row = cb.closest('.mountain-row');
                const displayName = row.dataset.displayName;
                const id = parseInt(cb.value);
                
                const pill = document.createElement('span');
                pill.className = 'mountain-pill';
                pill.setAttribute('data-id', id);
                
                const text = document.createTextNode(displayName + ' ');
                pill.appendChild(text);
                
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'remove-btn';
                removeBtn.setAttribute('aria-label', 'Remove ' + displayName);
                removeBtn.textContent = '✕';
                removeBtn.onclick = function() { removeResort(id); };
                pill.appendChild(removeBtn);
                
                pillsContainer.appendChild(pill);
            });
            
            updateExpandToggle(selectedResortIds.size);
        }
        
        function updateExpandToggle(count) {
            const pillsContainer = document.getElementById('selected-pills');
            const expandToggle = document.getElementById('expand-toggle');
            const expandCount = document.getElementById('expand-count');
            const fade = document.getElementById('selected-fade');
            
            const isOverflowing = pillsContainer.scrollHeight > pillsContainer.clientHeight;
            
            if (count > 0 && (isOverflowing || isExpanded)) {
                expandToggle.style.display = 'block';
                expandCount.textContent = count;
                fade.style.display = isExpanded ? 'none' : 'block';
            } else {
                expandToggle.style.display = 'none';
                fade.style.display = 'none';
            }
        }
        
        function toggleExpand() {
            const wrapper = document.getElementById('selected-wrapper');
            const pillsContainer = document.getElementById('selected-pills');
            const expandToggle = document.getElementById('expand-toggle');
            const fade = document.getElementById('selected-fade');
            
            isExpanded = !isExpanded;
            
            if (isExpanded) {
                wrapper.classList.add('expanded');
                pillsContainer.classList.add('expanded');
                expandToggle.innerHTML = 'Collapse';
                fade.style.display = 'none';
            } else {
                wrapper.classList.remove('expanded');
                pillsContainer.classList.remove('expanded');
                const count = selectedResortIds.size;
                expandToggle.innerHTML = 'View all selected (<span id="expand-count">' + count + '</span>)';
                fade.style.display = 'block';
            }
        }
    </script>
</body>
</html>
