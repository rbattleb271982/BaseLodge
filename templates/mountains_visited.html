<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Mountains Visited</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mountain-search {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            font-size: 15px;
            margin-bottom: var(--bl-space-4);
        }
        
        .selected-counter {
            font-size: 13px;
            color: var(--bl-color-text-muted);
            margin-bottom: var(--bl-space-6);
        }
        
        .selected-mountains {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bl-space-3);
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-pill {
            background: var(--bl-color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .mountain-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: var(--bl-space-6);
        }
        
        .mountain-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bl-color-border);
            font-size: 14px;
            cursor: pointer;
        }
        
        .mountain-row input {
            margin-right: var(--bl-space-4);
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .mountain-row.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Mountains Visited</h1>
        
        <form method="POST">
            <input type="text" class="mountain-search" id="mountain-search" placeholder="Search mountains..." oninput="filterMountains()">
            
            <div class="selected-counter">
                <span id="count-display">{{ mountains_visited_count }} selected</span>
            </div>
            
            {% if selected_mountains %}
            <div class="selected-mountains" id="selected-pills">
                {% for m in selected_mountains %}
                <span class="mountain-pill">{{ m }}</span>
                {% endfor %}
            </div>
            {% endif %}
            
            <div class="mountain-list" id="mountain-list">
                {% for mountain in all_mountains %}
                <label class="mountain-row" data-mountain="{{ mountain.lower() }}">
                    <input type="checkbox" name="mountains" value="{{ mountain }}"
                           {% if mountain in selected_mountains %}checked{% endif %} onchange="updatePills()">
                    {{ mountain }}
                </label>
                {% endfor %}
            </div>
            
            <button type="submit" class="bl-btn-primary" style="width: 100%;">Save</button>
        </form>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const selectedMountains = {{ selected_mountains | tojson }};
        
        function filterMountains() {
            const searchTerm = document.getElementById('mountain-search').value.toLowerCase();
            const rows = document.querySelectorAll('.mountain-row');
            
            rows.forEach(row => {
                const mountain = row.getAttribute('data-mountain');
                if (mountain.includes(searchTerm)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }
        
        function updatePills() {
            const checks = document.querySelectorAll('input[name="mountains"]:checked');
            const pillsContainer = document.getElementById('selected-pills');
            const countDisplay = document.getElementById('count-display');
            
            const selected = Array.from(checks).map(c => c.value);
            countDisplay.textContent = selected.length + ' selected';
            
            pillsContainer.innerHTML = '';
            selected.forEach(m => {
                const pill = document.createElement('span');
                pill.className = 'mountain-pill';
                pill.textContent = m;
                pillsContainer.appendChild(pill);
            });
        }
    </script>
</body>
</html>
