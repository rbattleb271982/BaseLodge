<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Friends — BaseLodge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    {% include 'components/analytics_head.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .invite-page-title {
            font-family: var(--bl-font-serif);
            font-size: 22px;
            font-weight: 400;
            color: var(--bl-color-text);
            margin: 0 0 4px 0;
        }
        .invite-page-sub {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            margin: 0 0 24px 0;
            line-height: 1.5;
        }
        .invite-action-row {
            margin-bottom: 8px;
        }
        .invite-copy-btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--bl-color-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            margin-bottom: 24px;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .invite-qr-block {
            border-top: 1px solid #EDE9E2;
            border-bottom: 1px solid #EDE9E2;
            padding: 24px 16px;
            text-align: center;
        }
        .invite-qr-block img {
            width: 180px;
            height: 180px;
            display: block;
            margin: 0 auto 10px;
        }
        .invite-qr-label {
            font-size: 12px;
            color: var(--bl-color-text-muted);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="page-container" style="padding: 24px 16px 88px;">
        <h1 class="invite-page-title">Invite friends</h1>
        <p class="invite-page-sub">Share this link or QR code to connect with friends on BaseLodge.</p>

        <div class="invite-action-row">
            <a href="sms:?&body=Hey! I'm using BaseLodge to plan mountain trips with friends. Join me here. {{ invite_url }}"
               class="bl-btn-primary" style="display: block; width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;">
                Invite via text
            </a>
        </div>

        <button id="copyInvite" class="invite-copy-btn">Copy invite link</button>

        <div class="invite-qr-block">
            <img src="{{ url_for('my_qr') }}" alt="Your QR Code">
            <p class="invite-qr-label">Have your friends scan this to connect.</p>
        </div>
    </div>

    {% include 'components/bottom_nav.html' %}

    <script>
        const inviteUrl = "{{ invite_url }}";

        document.getElementById("copyInvite").onclick = () => {
            navigator.clipboard.writeText(inviteUrl).then(() => {
                const btn = document.getElementById("copyInvite");
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2500);
            }).catch(() => {
                alert("Failed to copy link");
            });
        };
    </script>
</body>
</html>
