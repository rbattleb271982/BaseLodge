<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Invite Friends</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .invite-container {
            padding: var(--bl-space-8);
            max-width: 500px;
            margin: 0 auto;
        }
        
        .invite-header {
            text-align: center;
            margin-bottom: var(--bl-space-8);
        }
        
        .invite-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--bl-color-text);
            margin-bottom: var(--bl-space-3);
        }
        
        .invite-description {
            font-size: 15px;
            color: var(--bl-color-text-muted);
            line-height: 1.6;
            margin-bottom: var(--bl-space-8);
        }
        
        .invite-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--bl-space-5);
            margin-bottom: var(--bl-space-8);
        }
        
        .invite-btn {
            padding: var(--bl-space-6) var(--bl-space-5);
            border-radius: var(--bl-radius-lg);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        
        .invite-btn-primary {
            background: var(--bl-color-primary);
            color: white;
            box-shadow: var(--bl-shadow-soft);
        }
        
        .invite-btn-primary:hover {
            background: #720115;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .invite-btn-secondary {
            background: white;
            color: var(--bl-color-text);
            border: 1px solid var(--bl-color-border);
        }
        
        .invite-btn-secondary:hover {
            background: var(--bl-color-bg);
            border-color: var(--bl-color-text-muted);
        }
        
        .qr-placeholder {
            background: var(--bl-color-bg);
            border: 2px dashed var(--bl-color-border);
            border-radius: var(--bl-radius-md);
            padding: var(--bl-space-8);
            text-align: center;
            color: var(--bl-color-text-muted);
            font-size: 14px;
            margin-top: var(--bl-space-6);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="invite-container">
            <div class="invite-header">
                <h1 class="invite-title">Invite a Friend</h1>
                <p class="invite-description">Share Base Lodge with your ski crew. Copy your invite link or let your friend scan your QR code.</p>
            </div>
            
            <h2 style="font-size: 18px; font-weight: 600; margin-top: var(--bl-space-8); margin-bottom: var(--bl-space-5); color: var(--bl-color-text);">Invite via QR Code</h2>
            <p style="font-size: 14px; color: var(--bl-color-text-muted); margin-bottom: var(--bl-space-6);">Let your friends scan this QR code to connect with you instantly.</p>
            
            <div style="text-align: center; background: white; padding: var(--bl-space-6); border-radius: var(--bl-radius-lg); border: 1px solid var(--bl-color-border); margin-bottom: var(--bl-space-8);">
                <img src="{{ url_for('my_qr') }}" alt="Your QR Code" style="width: 260px; height: 260px; display: block;">
                <p style="font-size: 13px; color: var(--bl-color-text-muted); margin-top: var(--bl-space-4);">Scan with any camera or QR reader</p>
            </div>
        </div>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
</body>
</html>
