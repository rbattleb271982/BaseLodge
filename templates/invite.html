<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Invite Friends</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-container" style="padding: 16px 16px 88px;">
        <div class="bl-header">Invite</div>
        
        <div style="background: var(--bl-color-surface); border-radius: 10px; padding: 14px; margin-bottom: 20px;">
            <p style="font-size: 0.9rem; color: var(--bl-color-text-muted); line-height: 1.6; margin: 0;">
                Invite friends to connect on Base Lodge. See when you're both free to ski, share trips, and track overlapping days together.
            </p>
        </div>
        
        <a href="sms:?&body=Hey! I'm using BaseLodge to plan ski trips with friends. Join me here 👉 {{ invite_url }}" 
           style="display: block; width: 100%; padding: 14px 16px; background: var(--bl-color-primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; text-align: center; text-decoration: none;">
            Invite via text
        </a>
        
        <p style="font-size: 0.8rem; color: var(--bl-color-text-muted); text-align: center; margin: 0 0 24px 0;">
            You can invite up to 10 people total
        </p>
        
        <div style="background: var(--bl-color-surface); border-radius: 12px; padding: 20px 16px; text-align: center; margin-bottom: 16px;">
            <img src="{{ url_for('my_qr') }}" alt="Your QR Code" style="width: 200px; height: 200px; display: block; margin: 0 auto 12px;">
            <p style="font-size: 0.8rem; color: var(--bl-color-text-muted); margin: 0;">
                Scan with any camera
            </p>
        </div>
        
        <button id="copyInvite" style="width: 100%; padding: 12px 16px; background: transparent; color: var(--bl-color-text-muted); border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; text-decoration: underline;">
            Copy invite link
        </button>
    </div>
    
    {% include 'components/bottom_nav.html' %}
    
    <script>
        const inviteUrl = "{{ invite_url }}";

        document.getElementById("copyInvite").onclick = () => {
            navigator.clipboard.writeText(inviteUrl).then(() => {
                const btn = document.getElementById("copyInvite");
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                alert("Failed to copy link");
            });
        };
    </script>
</body>
</html>
