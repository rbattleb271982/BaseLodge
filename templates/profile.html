<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card profile-card">
        <h1 class="auth-title">{{ user.first_name }} {{ user.last_name }}</h1>
        
        <div class="profile-info">
            <p class="profile-detail">I'm a <strong>{{ user.rider_type }}</strong></p>
            <p class="profile-detail">Current pass: <strong>{{ user.pass_type }}</strong></p>
        </div>
        
        <div class="profile-actions">
            <button class="auth-button secondary" disabled>Edit Profile</button>
            <button class="auth-button" disabled>Add a Trip</button>
        </div>
        
        <div class="auth-helper">
            <a href="{{ url_for('logout') }}" class="link-button">Log Out</a>
        </div>
    </div>
</body>
</html>
