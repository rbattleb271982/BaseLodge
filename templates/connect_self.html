{% extends "base_app.html" %}
{% block title %}BaseLodge — Connect{% endblock %}
{% block head %}
<style>
        .connect-wrap {
            padding: 32px 20px 88px;
            max-width: 480px;
            margin: 0 auto;
        }
        .connect-hero {
            background: var(--bl-color-surface-blush);
            border: 0.5px solid var(--bl-color-primary);
            border-radius: var(--bl-radius-md);
            padding: 20px;
            margin-bottom: 28px;
        }
        .connect-hero-title {
            font-family: var(--bl-font-serif);
            font-size: 20px;
            font-weight: 400;
            color: var(--bl-color-text);
            margin: 0 0 6px 0;
        }
        .connect-hero-sub {
            font-size: 14px;
            color: var(--bl-color-text-muted);
            margin: 0;
            line-height: 1.5;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="page-container">
        <div class="connect-wrap">
            <div class="connect-hero">
                <h1 class="connect-hero-title">That's your own QR code.</h1>
                <p class="connect-hero-sub">Share it with your friends — they scan it to connect with you.</p>
            </div>
            <a href="{{ url_for('home') }}" class="bl-btn-primary" style="display: block; width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;">Back to Home</a>
        </div>
    </div>
    {% endblock %}
