<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Lodge - More</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">More</h1>
        
        <section class="settings-section">
            
            <!-- Mountains Visited -->
            <div class="settings-row">
                <div class="settings-main">
                    <div class="settings-label">Mountains visited</div>
                    <div class="settings-value">
                        {% if mountains_visited_count %}
                            {{ mountains_visited_count }} selected
                        {% else %}
                            None selected yet
                        {% endif %}
                    </div>
                </div>
                <a href="{{ url_for('mountains_visited') }}" class="settings-action">Change</a>
            </div>
            
            <!-- More Info -->
            <div class="settings-row">
                <div class="settings-main">
                    <div class="settings-label">More info</div>
                </div>
                <a href="{{ url_for('more_info') }}" class="settings-action">Change</a>
            </div>
            
            <!-- Friends -->
            <div class="settings-row">
                <div class="settings-main">
                    <div class="settings-label">Friends</div>
                </div>
                <a href="{{ url_for('friends') }}" class="settings-action">Open</a>
            </div>
            
            <!-- Invite Friends -->
            <div class="settings-row">
                <div class="settings-main">
                    <div class="settings-label">Invite friends</div>
                </div>
                <a href="{{ url_for('invite') }}" class="settings-action">Open</a>
            </div>
            
            <!-- Logout -->
            <div class="settings-row">
                <div class="settings-main">
                    <div class="settings-label">Log out</div>
                </div>
                <a href="{{ url_for('logout') }}" class="settings-action">Log out</a>
            </div>
            
        </section>
    </div>
    
    {% include 'components/bottom_nav.html' %}
</body>
</html>
