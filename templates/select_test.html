<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Test - iOS Debug</title>
</head>
<body>
    <h1>Minimal Select Test</h1>
    <p>Test native selects on iOS Safari</p>

    <div style="margin: 20px 0;">
        <label for="test-country">Country:</label><br>
        <select id="test-country" name="country">
            <option value="">Choose country</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
        </select>
    </div>

    <div style="margin: 20px 0;">
        <label for="test-state">State:</label><br>
        <select id="test-state" name="state" disabled>
            <option value="">Select a country first</option>
        </select>
    </div>

    <div style="margin: 20px 0;">
        <label for="test-resort">Resort:</label><br>
        <select id="test-resort" name="resort" disabled>
            <option value="">Select a state first</option>
        </select>
    </div>

    <div id="debug" style="margin-top: 40px; padding: 10px; background: #f0f0f0; font-family: monospace; font-size: 12px;">
        Debug log:
    </div>

    <script>
        const log = (msg) => {
            console.log(msg);
            document.getElementById('debug').innerHTML += '<br>' + msg;
        };

        const countrySelect = document.getElementById('test-country');
        const stateSelect = document.getElementById('test-state');
        const resortSelect = document.getElementById('test-resort');

        const states = {
            'US': ['CO', 'CA', 'UT', 'VT', 'NY'],
            'CA': ['BC', 'AB', 'ON', 'QC']
        };

        const resorts = {
            'CO': ['Vail', 'Breckenridge', 'Aspen'],
            'CA': ['Mammoth', 'Heavenly', 'Squaw Valley'],
            'UT': ['Park City', 'Snowbird', 'Alta'],
            'BC': ['Whistler', 'Big White'],
            'AB': ['Lake Louise', 'Sunshine Village']
        };

        log('Page loaded at ' + new Date().toISOString());
        log('Country disabled: ' + countrySelect.disabled);
        log('State disabled: ' + stateSelect.disabled);
        log('Resort disabled: ' + resortSelect.disabled);

        countrySelect.addEventListener('touchstart', () => log('Country touchstart'));
        countrySelect.addEventListener('focus', () => log('Country focus'));
        countrySelect.addEventListener('change', function() {
            log('Country changed to: ' + this.value);
            if (this.value) {
                stateSelect.innerHTML = '<option value="">Choose state</option>';
                (states[this.value] || []).forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    stateSelect.appendChild(opt);
                });
                stateSelect.disabled = false;
                log('State enabled, options: ' + stateSelect.options.length);
            } else {
                stateSelect.disabled = true;
            }
            resortSelect.innerHTML = '<option value="">Select a state first</option>';
            resortSelect.disabled = true;
        });

        stateSelect.addEventListener('change', function() {
            log('State changed to: ' + this.value);
            if (this.value) {
                resortSelect.innerHTML = '<option value="">Choose resort</option>';
                (resorts[this.value] || []).forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r;
                    opt.textContent = r;
                    resortSelect.appendChild(opt);
                });
                resortSelect.disabled = false;
                log('Resort enabled, options: ' + resortSelect.options.length);
            } else {
                resortSelect.disabled = true;
            }
        });

        resortSelect.addEventListener('change', function() {
            log('Resort changed to: ' + this.value);
        });
    </script>
</body>
</html>
