{% extends "base.html" %}
{% block content %}
<div class="page-container">
  <h1 class="page-title">
    {% if trip %}Edit trip{% else %}Add a trip{% endif %}
  </h1>

  <form method="POST" action="{{ form_action }}" class="form-card">
    <div class="form-group">
      <label for="state">State</label>
      <select id="state" name="state" required>
        <option value="">Select a state</option>
        {% set state_value = trip.state if trip else "" %}
        {% for abbr, name in [
          ('AL','Alabama'),('AK','Alaska'),('AZ','Arizona'),('AR','Arkansas'),
          ('CA','California'),('CO','Colorado'),('CT','Connecticut'),('DE','Delaware'),
          ('FL','Florida'),('GA','Georgia'),('HI','Hawaii'),('ID','Idaho'),
          ('IL','Illinois'),('IN','Indiana'),('IA','Iowa'),('KS','Kansas'),
          ('KY','Kentucky'),('LA','Louisiana'),('ME','Maine'),('MD','Maryland'),
          ('MA','Massachusetts'),('MI','Michigan'),('MN','Minnesota'),('MS','Mississippi'),
          ('MO','Missouri'),('MT','Montana'),('NE','Nebraska'),('NV','Nevada'),
          ('NH','New Hampshire'),('NJ','New Jersey'),('NM','New Mexico'),('NY','New York'),
          ('NC','North Carolina'),('ND','North Dakota'),('OH','Ohio'),('OK','Oklahoma'),
          ('OR','Oregon'),('PA','Pennsylvania'),('RI','Rhode Island'),('SC','South Carolina'),
          ('SD','South Dakota'),('TN','Tennessee'),('TX','Texas'),('UT','Utah'),
          ('VT','Vermont'),('VA','Virginia'),('WA','Washington'),('WV','West Virginia'),
          ('WI','Wisconsin'),('WY','Wyoming')
        ] %}
          <option value="{{ abbr }}" {% if state_value == abbr %}selected{% endif %}>{{ name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="mountain">Mountain</label>
      <select id="mountain" name="mountain" required data-current-mountain="{{ trip.mountain if trip else '' }}">
        {% if trip and trip.mountain %}<option value="{{ trip.mountain }}">{{ trip.mountain }}</option>{% else %}<option value="">Select a state first</option>{% endif %}
      </select>
    </div>
    <div class="form-group">
      <label for="start_date">Start date</label>
      <input type="date" id="start_date" name="start_date" required value="{% if trip and trip.start_date %}{{ trip.start_date.isoformat() }}{% endif %}">
    </div>
    <div class="form-group">
      <label for="end_date">End date</label>
      <input type="date" id="end_date" name="end_date" required value="{% if trip and trip.end_date %}{{ trip.end_date.isoformat() }}{% endif %}">
    </div>
    <div class="form-group toggle-group">
      {% set public_checked = (trip.is_public if trip is not none else True) %}
      <label class="toggle-label">
        <input type="checkbox" name="is_public" id="is_public" {% if public_checked %}checked{% endif %}>
        <span>Make this trip visible to friends</span>
      </label>
      <p class="helper-text">Only friends can see this trip.</p>
    </div>
    <button type="submit" class="primary-button">{% if trip %}Save changes{% else %}Save trip{% endif %}</button>
  </form>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const stateSelect = document.getElementById("state");
    const mountainSelect = document.getElementById("mountain");
    function loadMountainsForState(stateCode, currentMountain) {
      mountainSelect.innerHTML = "";
      mountainSelect.disabled = true;
      if (!stateCode) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "Select a state first";
        mountainSelect.appendChild(opt);
        return;
      }
      fetch(`/api/mountains/${stateCode}`)
        .then((res) => res.json())
        .then((data) => {
          mountainSelect.disabled = false;
          if (!Array.isArray(data) || data.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "No mountains defined for this state yet";
            mountainSelect.appendChild(opt);
            mountainSelect.disabled = true;
            return;
          }
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "Select a mountain";
          mountainSelect.appendChild(placeholder);
          data.forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            mountainSelect.appendChild(opt);
          });
          if (currentMountain) {
            mountainSelect.value = currentMountain;
          }
        })
        .catch(() => {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "Error loading mountains";
          mountainSelect.appendChild(opt);
          mountainSelect.disabled = true;
        });
    }
    stateSelect.addEventListener("change", function () {
      loadMountainsForState(stateSelect.value, null);
    });
    const existingState = stateSelect.value;
    const currentMountain = mountainSelect.dataset.currentMountain;
    if (existingState) {
      loadMountainsForState(existingState, currentMountain);
    }
  });
</script>
{% endblock %}
