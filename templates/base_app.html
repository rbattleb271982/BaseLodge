{% extends "base.html" %}
{% block body %}
<div class="app-shell">
  {% include 'components/top_bar.html' %}
  {% block content %}{% endblock %}
  {% include 'components/bottom_nav.html' %}
</div>
<script>
(function() {
  var _pt = window.performance && window.performance.timing;
  var _navStart = (_pt && _pt.navigationStart) ? _pt.navigationStart : Date.now();
  var _t0 = Date.now();

  document.addEventListener('click', function(e) {
    var el = e.target.closest('a[href],button[type="submit"]');
    if (!el) return;
    var href = el.getAttribute('href') || el.getAttribute('data-href') || '(submit)';
    var src = 'unknown';
    if      (el.closest('.bl-bottom-nav'))                         src = 'bottom-nav';
    else if (el.closest('.bl-top-bar'))                            src = 'topbar';
    else if (el.closest('[data-back]') || el.closest('.bl-back'))  src = 'back-link';
    else if (el.closest('.bl-trip-card,.trip-card'))               src = 'trip-card';
    else if (el.closest('.bl-friend-card,.friend-card'))           src = 'friend-card';
    else if (el.closest('.mountain-row,.resort-row'))              src = 'mountain-card';
    else if (el.closest('.bl-modal,.modal-overlay'))               src = 'modal';
    else if (el.closest('form'))                                   src = 'form';
    else if (el.closest('.bl-pill,.bl-cta,.bl-action'))            src = 'cta';
    console.log('[BL-NAV] click=' + href + ' source=' + src + ' t=' + (Date.now() - _navStart) + 'ms');
  }, true);

  document.addEventListener('DOMContentLoaded', function() {
    var dom = (_pt && _pt.domContentLoadedEventEnd && _pt.navigationStart)
      ? (_pt.domContentLoadedEventEnd - _pt.navigationStart)
      : (Date.now() - _t0);
    var total = Date.now() - _navStart;
    var ref = document.referrer ? (document.referrer.split('/').slice(-2).join('/') || 'direct') : 'direct';
    console.log('[BL-NAV] page=' + location.pathname + ' dom=' + dom + 'ms total=' + total + 'ms ref=' + ref);
  });
})();
</script>
<script>
/* ── blToast — shared inline notification utility (FINAL-MOBILE-QA-V1)
   Replaces browser alert() dialogs with a native-feeling overlay toast.
   Usage: blToast('Message here')  — auto-dismisses after 3 s.         */
function blToast(msg) {
    var prev = document.getElementById('bl-toast-msg');
    if (prev) prev.remove();
    var t = document.createElement('div');
    t.id = 'bl-toast-msg';
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:16px;right:16px;background:rgba(26,26,26,0.92);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.45;z-index:99999;text-align:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:opacity 0.25s ease;max-width:420px;margin:0 auto;pointer-events:none;font-family:inherit;';
    document.body.appendChild(t);
    setTimeout(function() {
        t.style.opacity = '0';
        setTimeout(function() { if (t.parentNode) t.remove(); }, 260);
    }, 3000);
}
document.addEventListener('DOMContentLoaded', function() {
    var flashWrap = document.querySelector('.bl-flash-wrap');
    if (!flashWrap) return;
    var dismissed = false;
    var dismissFlash = function() {
        if (dismissed || !flashWrap.parentNode) return;
        dismissed = true;
        flashWrap.style.transition = 'opacity 180ms ease, transform 180ms ease';
        flashWrap.style.opacity = '0';
        flashWrap.style.transform = 'translateY(-6px)';
        setTimeout(function() {
            if (flashWrap && flashWrap.parentNode) flashWrap.remove();
        }, 200);
        window.removeEventListener('scroll', onScroll, { passive: true });
        document.removeEventListener('click', onClick, true);
        document.removeEventListener('touchstart', onTouch, true);
        document.removeEventListener('keydown', onKey, true);
    };
    var onScroll = function() { dismissFlash(); };
    var onClick = function() { dismissFlash(); };
    var onTouch = function() { dismissFlash(); };
    var onKey = function() { dismissFlash(); };
    window.addEventListener('scroll', onScroll, { passive: true });
    document.addEventListener('click', onClick, true);
    document.addEventListener('touchstart', onTouch, true);
    document.addEventListener('keydown', onKey, true);
});
</script>
{% block scripts %}{% endblock %}
<script>
/* ── Bottom-nav tap feedback — immediate visual response to navigation taps.
   When the user taps a nav item that triggers a full-page navigation, the MPA
   shell shows a blank WKWebView frame until the server responds. This script
   applies an instant pressed state to the tapped item so the UI never feels
   frozen, even on 200–400 ms server round-trips.
   Cleans itself up automatically — the new page renders a fresh nav.         */
(function() {
  var nav = document.querySelector('.bl-bottom-nav');
  if (!nav) return;
  nav.querySelectorAll('.bl-nav-item').forEach(function(link) {
    link.addEventListener('click', function() {
      if (this.classList.contains('active')) return;
      nav.querySelectorAll('.bl-nav-item').forEach(function(l) {
        l.style.opacity = '0.45';
        l.style.transition = 'opacity 80ms ease';
      });
      this.style.opacity = '1';
      this.style.transition = 'opacity 80ms ease';
    });
  });
  /* touchstart fires before click — gives haptic-matching visual on iOS */
  nav.querySelectorAll('.bl-nav-item').forEach(function(link) {
    link.addEventListener('touchstart', function() {
      if (this.classList.contains('active')) return;
      this.style.opacity = '0.6';
      this.style.transition = 'opacity 60ms ease';
    }, { passive: true });
  });
})();
</script>
<script>
/* ── bl-page-loader — 2px bordeaux progress bar for internal navigation.
   Shows immediately on tap of any internal <a> link; cleans up on pageshow.
   Excluded: mailto/tel/sms, external http(s), _blank, #-only, forms,
             data-no-loader, data-bs-toggle / data-toggle (JS-only controls). */
(function () {
  var bar = document.getElementById('bl-page-loader');
  if (!bar) return;
  var _hideTimer = null;

  function _show() {
    clearTimeout(_hideTimer);
    bar.style.transition = 'none';
    bar.style.width = '0';
    bar.style.opacity = '1';
    bar.offsetWidth; /* force reflow so reset is instant */
    bar.style.transition = 'width .20s ease';
    bar.style.width = '70%';
  }

  function _hide() {
    clearTimeout(_hideTimer);
    bar.style.transition = 'width .06s ease';
    bar.style.width = '100%';
    _hideTimer = setTimeout(function () {
      bar.style.transition = 'opacity .22s ease';
      bar.style.opacity = '0';
      setTimeout(function () {
        bar.style.transition = 'none';
        bar.style.width = '0';
      }, 240);
    }, 60);
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('a');
    if (!el) return;
    var href = (el.getAttribute('href') || '').trim();
    /* exclusions */
    if (!href || href === '#' || href.charAt(0) === '#') return;
    if (/^(mailto:|tel:|sms:)/i.test(href)) return;
    if (/^https?:\/\//i.test(href)) return;
    if (el.target === '_blank') return;
    if (el.closest('form')) return;
    if (el.hasAttribute('data-no-loader')) return;
    if (el.hasAttribute('data-bs-toggle') || el.hasAttribute('data-toggle')) return;
    _show();
  }, true);

  /* pageshow covers initial load + back-forward cache restore */
  window.addEventListener('pageshow', function () { _hide(); });
}());
</script>
</body>
</html>
