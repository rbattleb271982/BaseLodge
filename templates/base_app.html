<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>{% block title %}BaseLodge{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="shortcut icon" href="/static/icons/favicon.ico">
    {% include 'components/analytics_head.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
<div class="app-shell">
    {% block content %}{% endblock %}
    {% include 'components/bottom_nav.html' %}
</div>
<script>
/* ── blToast — shared inline notification utility (FINAL-MOBILE-QA-V1)
   Replaces browser alert() dialogs with a native-feeling overlay toast.
   Usage: blToast('Message here')  — auto-dismisses after 3 s.         */
function blToast(msg) {
    var prev = document.getElementById('bl-toast-msg');
    if (prev) prev.remove();
    var t = document.createElement('div');
    t.id = 'bl-toast-msg';
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:16px;right:16px;background:rgba(26,26,26,0.92);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.45;z-index:99999;text-align:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:opacity 0.25s ease;max-width:420px;margin:0 auto;pointer-events:none;font-family:inherit;';
    document.body.appendChild(t);
    setTimeout(function() {
        t.style.opacity = '0';
        setTimeout(function() { if (t.parentNode) t.remove(); }, 260);
    }, 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
